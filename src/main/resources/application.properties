spring.application.name=FileStorage


#Configurando o multipart para os uploads dos arquivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=5GB
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB

#Caminho para salvar os arquivos na pasta

file.upload-dir=C:/Users/IPCOM/Documents/uploads
server.error.include-message=always

#H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=Sec123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect