<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Busca Avançada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        :root {
            --agro-green: #1B5E20;
            --agro-yellow: #FBC02D;
        }

        body {
            background-color: #f6f9f4;
        }

        h2, h3, h4 {
            color: var(--agro-green);
        }

        .form-label {
            color: #333;
            font-weight: 500;
        }

        .btn-primary {
            background-color: var(--agro-green);
            border-color: var(--agro-green);
        }

        .btn-primary:hover {
            background-color: #145a1c;
            border-color: #145a1c;
        }

        .btn-success {
            background-color: var(--agro-yellow);
            border-color: var(--agro-yellow);
            color: #000;
        }

        .btn-success:hover {
            background-color: #e0ac00;
            border-color: #e0ac00;
        }

        .bg-light {
            background-color: #ecf4eb !important;
        }

        .folder-children {
            margin-left: 1rem;
            padding-left: 0.5rem;
            border-left: 1px dashed #ccc;
        }

        ul, li {
            list-style: none;
        }

        .toggle {
            cursor: pointer;
            user-select: none;
            display: inline-block;
            width: 18px;
            color: var(--agro-green);
        }

        .form-check-all {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .list-group-item {
            background-color: #fff;
            border-left: 5px solid var(--agro-green);
        }

        .list-group-item strong {
            color: var(--agro-green);
        }

        .border {
            border-color: var(--agro-green) !important;
        }

        .bg-white {
            background-color: #fff;
        }
        .btn-outline-primary {
    color: var(--agro-green);
    border-color: var(--agro-green);
}

.btn-outline-primary:hover {
    background-color: var(--agro-green);
    color: white;
}
.btn-success {
    background-color: #1B5E20;
    border-color: #1B5E20;
}

.btn-success:hover {
    background-color: #145A16;
    border-color: #145A16;
}



    </style>
</head>
<body>
<div class="container mt-4">
    <h2>Busca Avançada</h2>
    <a href="/" class="btn btn-outline-primary mb-3">
        ← Voltar ao Início
    </a>

    <form th:action="@{/advanced-search}" method="post" class="border rounded p-4 bg-light mb-4">
        <h4 class="mb-3">Filtros de Busca</h4>
        <div class="row g-3">
            <!-- Filtros -->
            <div class="col-md-4">
                <label for="query" class="form-label">Buscar Texto</label>
                <input type="text" id="query" name="query" class="form-control" th:value="${query}" />
            </div>
            <div class="col-md-4">
                <label for="keyword" class="form-label">Palavra-chave</label>
                <select id="keyword" name="keyword" class="form-select">
                    <option value="">-- Selecione --</option>
                    <option th:each="kw : ${keywords}" th:value="${kw}" th:text="${kw}" th:selected="${kw == keyword}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="city" class="form-label">Cidade</label>
                <select id="city" name="city" class="form-select">
                    <option value="">-- Selecione --</option>
                    <option th:each="c : ${cities}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCity}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="institute" class="form-label">Instituto</label>
                <select id="institute" name="institute" class="form-select">
                    <option value="">-- Selecione --</option>
                    <option th:each="inst : ${institutes}" th:value="${inst}" th:text="${inst}" th:selected="${inst == selectedInstitute}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="startDate" class="form-label">Data Início</label>
                <input type="date" id="startDate" name="startDate" class="form-control" th:value="${startDate}" />
            </div>
            <div class="col-md-3">
                <label for="endDate" class="form-label">Data Fim</label>
                <input type="date" id="endDate" name="endDate" class="form-control" th:value="${endDate}" />
            </div>
        </div>

        <!-- Pastas -->
        <div class="mt-4">
            <label class="form-label">Pastas</label>
            <div class="border rounded p-3 bg-white" style="max-height: 300px; overflow-y: auto;">
                <div class="form-check-all">
                    <input type="checkbox" id="checkAllFolders" onclick="toggleAllFolders(this)" class="form-check-input me-2" />
                    <label for="checkAllFolders" class="form-check-label">Selecionar Todas</label>
                </div>
                <ul class="mb-0" style="padding-left: 0;">
                    <li th:each="folder : ${folders}">
                        <span class="toggle me-1" onclick="toggleSubfolders(this)">&#x25B6;</span>
                        <label>
                            <input type="checkbox" name="folders" class="folder-checkbox" th:value="${folder.path}" th:checked="${#lists.contains(selectedFolders ?: {}, folder.path)}" />
                            <span th:text="${folder.name}"></span>
                        </label>
                        <ul class="folder-children" style="display:none;" th:if="${folder.subFolders}" th:insert="~{this :: renderSubFolders(${folder.subFolders}, ${selectedFolders})}"></ul>
                    </li>
                </ul>
            </div>
<!--            <form id="downloadFoldersForm" th:action="@{/explorer/download-folders}" method="post" class="mt-2">-->
<!--                <input type="hidden" name="selectedFolders" id="selectedFoldersInput" />-->
<!--                <button type="button" class="btn btn-success" onclick="submitSelectedFolders()">-->
<!--                    Baixar Pastas Selecionadas (.ZIP)-->
<!--                </button>-->
<!--            </form>-->

        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary w-100">Buscar</button>
        </div>
    </form>

    <!-- Resultados -->
    <form th:action="@{/explorer/download-zip}" method="post" id="downloadZipForm">
        <div th:if="${files != null}">
            <h3>Resultados</h3>
            <div th:if="${files.size() == 0}">
                <p>Nenhum arquivo encontrado.</p>
            </div>
            <ul th:if="${files.size() > 0}" class="list-group">
                <div class="form-check-all">
                    <input type="checkbox" id="checkAllFiles" onclick="toggleAllFiles(this)" class="form-check-input me-2" />
                    <label for="checkAllFiles" class="form-check-label">Selecionar Todos os Arquivos</label>
                </div>
                <li class="list-group-item d-flex justify-content-between align-items-center" th:each="file : ${files}">
                    <div>
                        <input type="checkbox" name="files" class="file-checkbox" th:value="${file.fullPath}" />
                        <strong th:text="${file.name}"></strong><br />
                        <small th:text="${file.relativePath}"></small>
                    </div>
                    <div>
                        <a th:href="@{/view(path=${file.fullPath})}" target="_blank" class="btn btn-sm btn-outline-primary">Visualizar</a>
                        <a th:href="@{'/explorer/download'(path=${file.fullPath})}" class="btn btn-sm btn-success">Download</a>
                    </div>
                </li>
            </ul>
            <div class="d-flex flex-wrap gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    Baixar Arquivos Selecionados (ZIP)
                </button>
            </div>
        </div>
    </form>
</div>

<th:block th:fragment="renderSubFolders(subfolders, selectedFolders)">
    <li th:each="sub : ${subfolders}">
        <span class="toggle" onclick="toggleSubfolders(this)">&#x25B6;</span>
        <label>
            <input type="checkbox" name="folders" class="folder-checkbox" th:value="${sub.path}" th:checked="${#lists.contains(selectedFolders ?: {}, sub.path)}" />
            <span th:text="${sub.name}"></span>
        </label>
        <ul class="folder-children" style="display:none;" th:if="${sub.subFolders}" th:insert="~{this :: renderSubFolders(${sub.subFolders}, ${selectedFolders})}"></ul>
    </li>
</th:block>

<script>
    function toggleSubfolders(element) {
        const nextUl = element.parentElement.querySelector('.folder-children');
        if (!nextUl) return;

        if (nextUl.style.display === 'none' || nextUl.style.display === '') {
            nextUl.style.display = 'block';
            element.innerHTML = '&#x25BC;';
        } else {
            nextUl.style.display = 'none';
            element.innerHTML = '&#x25B6;';
        }
    }

    function toggleAllFolders(master) {
        const checkboxes = document.querySelectorAll('.folder-checkbox');
        checkboxes.forEach(cb => cb.checked = master.checked);
    }

    function toggleAllFiles(master) {
        const checkboxes = document.querySelectorAll('.file-checkbox');
        checkboxes.forEach(cb => cb.checked = master.checked);
    }
    function prepareSelectedFolders() {
    const selected = Array.from(document.querySelectorAll('.folder-checkbox:checked')).map(cb => cb.value);
    document.getElementById('selectedFoldersInput').value = selected.join(',');
    return true;
}


</script>
</body>
</html>
