<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Busca Avançada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        /* Indentação para árvore de pastas */
        .folder-children {
            margin-left: 20px;
            padding-left: 0;
        }
        /* Estilo para o ícone de toggle */
        .toggle {
            cursor: pointer;
            user-select: none;
            display: inline-block;
            width: 18px;
        }
        /* Remove marcador padrão do ul */
        ul, li {
            list-style: none;
        }
        .toggle {
    cursor: pointer;
    user-select: none;
    display: inline-block;
    width: 18px;
    color: #0d6efd;
}
.folder-children {
    margin-left: 1rem;
    padding-left: 0.5rem;
    border-left: 1px dashed #ccc;
}

    </style>
</head>
<body>
<div class="container mt-4">
    <h2>Busca Avançada</h2>
    <form th:action="@{/advanced-search}" method="post" class="border rounded p-4 bg-light mb-4">
        <h4 class="mb-3">Filtros de Busca</h4>
        <div class="row g-3">
            <div class="col-md-4">
                <label for="query" class="form-label">Buscar Texto</label>
                <input type="text" id="query" name="query" class="form-control"
                       th:value="${query}" placeholder="Digite termo para busca..." />
            </div>

            <div class="col-md-4">
                <label for="keyword" class="form-label">Palavra-chave</label>
                <select id="keyword" name="keyword" class="form-select">
                    <option value="">-- Selecione --</option>
                    <option th:each="kw : ${keywords}" th:value="${kw}" th:text="${kw}" th:selected="${kw == keyword}"></option>
                </select>
            </div>

            <div class="col-md-4">
                <label for="city" class="form-label">Cidade</label>
                <select id="city" name="city" class="form-select">
                    <option value="">-- Selecione --</option>
                    <option th:each="c : ${cities}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCity}"></option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="institute" class="form-label">Instituto</label>
                <select id="institute" name="institute" class="form-select">
                    <option value="">-- Selecione --</option>
                    <option th:each="inst : ${institutes}" th:value="${inst}" th:text="${inst}" th:selected="${inst == selectedInstitute}"></option>
                </select>
            </div>

            <div class="col-md-3">
                <label for="startDate" class="form-label">Data Início</label>
                <input type="date" id="startDate" name="startDate" class="form-control"
                       th:value="${startDate}" />
            </div>
            <div class="col-md-3">
                <label for="endDate" class="form-label">Data Fim</label>
                <input type="date" id="endDate" name="endDate" class="form-control"
                       th:value="${endDate}" />
            </div>
        </div>

        <!-- Seção de pastas -->
        <div class="mt-4">
            <label class="form-label">Pastas</label>
            <div class="border rounded p-3 bg-white" style="max-height: 300px; overflow-y: auto;">
                <ul class="mb-0" style="padding-left: 0;">
                    <li th:each="folder : ${folders}">
                        <span class="toggle me-1" onclick="toggleSubfolders(this)">&#x25B6;</span>
                        <label>
                            <input type="checkbox" name="folders" th:value="${folder.path}"
                                   th:checked="${#lists.contains(selectedFolders ?: {}, folder.path)}" />
                            <span th:text="${folder.name}"></span>
                        </label>
                        <ul class="folder-children" style="display:none;"
                            th:if="${folder.subFolders}"
                            th:insert="~{this :: renderSubFolders(${folder.subFolders}, ${selectedFolders})}">
                        </ul>
                    </li>
                </ul>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary w-100">Buscar</button>
        </div>
    </form>
</div>


    <hr/>

    <!-- Resultados da busca -->
    <form th:action="@{/explorer/download-zip}" method="post" id="downloadZipForm">
        <div th:if="${files != null}">
            <h3>Resultados</h3>
            <div th:if="${files.size() == 0}">
                <p>Nenhum arquivo encontrado.</p>
            </div>
            <ul th:if="${files.size() > 0}" class="list-group">
                <li class="list-group-item d-flex justify-content-between align-items-center" th:each="file : ${files}">
                    <div>
                        <input type="checkbox" name="files" th:value="${file.fullPath}" />
                        <strong th:text="${file.name}"></strong><br/>
                        <small th:text="${file.fullPath}"></small>
                    </div>
                    <div>
                        <a th:href="@{/view(path=${file.fullPath})}" target="_blank" class="btn btn-sm btn-outline-primary">Visualizar</a>
                        <a th:href="@{'/explorer/download'(path=${file.fullPath})}" class="btn btn-sm btn-success">Download</a>

                        <!-- Mostrar botão Baixar Pasta somente se for pasta -->
                        <a th:if="${foldersSet.contains(file.fullPath)}"
                           th:href="@{/explorer/download-folder(path=${file.fullPath})}"
                           class="btn btn-sm btn-outline-warning">
                            Baixar Pasta (.zip)
                        </a>

                        <p>file.fullPath: <span th:text="${file.fullPath}"></span></p>
                        <p>foldersSet: <span th:text="${foldersSet}"></span></p>

                    </div>
                </li>

            </ul>
            <button type="submit" class="btn btn-primary mt-3">Baixar Selecionados (ZIP)</button>
        </div>
    </form>
</div>

<!-- Fragmento Thymeleaf para renderizar subpastas recursivamente -->
<th:block th:fragment="renderSubFolders(subfolders, selectedFolders)">
    <li th:each="sub : ${subfolders}">
        <span class="toggle" onclick="toggleSubfolders(this)">&#x25B6;</span>
        <label>
            <input type="checkbox" name="folders" th:value="${sub.path}" th:checked="${#lists.contains(selectedFolders ?: {}, sub.path)}" />
            <span th:text="${sub.name}"></span>
        </label>
        <ul class="folder-children" style="display:none;" th:if="${sub.subFolders}" th:insert="~{this :: renderSubFolders(${sub.subFolders}, ${selectedFolders})}"></ul>
    </li>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSubfolders(element) {
        const nextUl = element.parentElement.querySelector('.folder-children');
        if (!nextUl) return;

        if (nextUl.style.display === 'none' || nextUl.style.display === '') {
            nextUl.style.display = 'block';
            element.innerHTML = '&#x25BC;'; // triângulo ▼
        } else {
            nextUl.style.display = 'none';
            element.innerHTML = '&#x25B6;'; // triângulo ►
        }
    }
</script>
</body>
</html>
