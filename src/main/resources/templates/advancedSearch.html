    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>Busca Avançada</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            :root {
                --agro-green: #1B5E20;
                --agro-yellow: #FBC02D;
            }

            body {
                background-color: #f6f9f4;
                font-family: Arial, sans-serif;
            }

            h2, h3, h4 {
                color: var(--agro-green);
            }

            .form-label {
                color: #333;
                font-weight: 500;
            }

            .btn-primary {
                background-color: var(--agro-green);
                border-color: var(--agro-green);
            }

            .btn-primary:hover {
                background-color: #145a1c;
                border-color: #145a1c;
            }

            .btn-success {
                background-color: var(--agro-yellow);
                border-color: var(--agro-yellow);
                color: #000;
            }

            .btn-success:hover {
                background-color: #e0ac00;
                border-color: #e0ac00;
            }

            .bg-light {
                background-color: #ecf4eb !important;
            }

            .folder-children {
                margin-left: 1rem;
                padding-left: 0.5rem;
                border-left: 1px dashed #ccc;
            }

            ul, li {
                list-style: none;
            }

            .toggle {
                cursor: pointer;
                user-select: none;
                display: inline-block;
                width: 18px;
                color: var(--agro-green);
            }

            .form-check-all {
                margin-bottom: 10px;
                display: flex;
                align-items: center;
            }

            .list-group-item {
                background-color: #fff;
                border-left: 5px solid var(--agro-green);
            }

            .list-group-item strong {
                color: var(--agro-green);
            }

            .border {
                border-color: var(--agro-green) !important;
            }

            .bg-white {
                background-color: #fff;
            }

            .btn-outline-primary {
                color: var(--agro-green);
                border-color: var(--agro-green);
            }

            .btn-outline-primary:hover {
                background-color: var(--agro-green);
                color: white;
            }

            .btn-success {
                background-color: #1B5E20;
                border-color: #1B5E20;
            }

            .btn-success:hover {
                background-color: #145A16;
                border-color: #145A16;
            }

            .row > .col-md-4, .row > .col-md-3 {
                padding-bottom: 15px;
            }

            .form-check-label {
                font-weight: normal;
            }

            .folder-children {
                padding-left: 1.5rem;
                padding-top: 1rem;
            }

            .folder-checkbox {
                margin-right: 10px;
            }
            /* Estilo para o botão Limpar Seleção */
            /* Estilos para o botão com a classe btn-clear */
            /* Estilo para o contêiner que segura o botão */
    .button-container-clear {
      display: flex;
      justify-content: flex-end; /* Alinha o botão à direita */
      margin-top: 10px; /* Ajuste para um pequeno espaço em cima */
    }

    /* Estilos para o botão com a classe btn-clear */
    .btn-clear {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 6px 12px;
      gap: 8px;
      height: 34px;

      border: none;
      background: #ff362b34;
      border-radius: 20px;
      cursor: pointer;
    }

    .label-clear {
      line-height: 20px;
      font-size: 17px;
      color: #ff342b;
      letter-spacing: 1px;
    }

    .btn-clear:hover {
      background: #ff362b52;
    }

    .btn-clear:hover .svg-icon {
      animation: spin 2s linear infinite;
    }

    /* Animação de rotação (se você quiser manter) */
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(-360deg);
      }
    }



        </style>
    </head>
    <body>
    <div class="container mt-5">
        <h2>Busca Avançada</h2>
        <a href="/" class="btn btn-outline-primary mb-3">
            ← Voltar ao Início
        </a>

        <form th:action="@{/advanced-search}" method="post" class="border rounded p-4 bg-light mb-4">
            <h4 class="mb-3">Filtros de Busca</h4>
            <div class="row g-3">
                <!-- Filtros -->
                <div class="col-md-4">
                    <label for="query" class="form-label">Buscar Texto</label>
                    <input type="text" id="query" name="query" class="form-control" th:value="${query}" placeholder="Digite o texto para pesquisa"/>
                </div>
                <div class="col-md-4">
                    <label for="keyword" class="form-label">Palavra-chave</label>
                    <select id="keyword" name="keyword" class="form-select" onchange="updateSubkeywords()">
                        <option value="">Selecione uma palavra-chave</option>
                        <th:block th:each="key : ${keywords}">
                            <option th:value="${key}" th:text="${key}" th:selected="${key == selectedKeyword}"></option>
                        </th:block>
                    </select>
                </div>


                <div id="subkeywords-container" class="col-md-4 mt-3">
                    <label class="form-label">Subpalavras-chave</label>
                    <div id="subkeywords-list" class="form-check">
                        <th:block th:if="${selectedKeyword != null and selectedKeyword != '' and subkeywordsMap.containsKey(selectedKeyword)}">
                            <th:block th:each="subkey : ${subkeywordsMap[selectedKeyword]}">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           th:id="${subkey}" name="selectedSubkeywords"
                                           th:value="${subkey}"
                                           th:checked="${selectedSubkeywords != null and selectedSubkeywords.contains(subkey)}" />
                                    <label class="form-check-label" th:for="${subkey}" th:text="${subkey}"></label>
                                </div>
                            </th:block>
                        </th:block>
                    </div>
                </div>


                <!-- Campo oculto para passar as subpalavras selecionadas -->
                <input type="hidden" id="selectedSubkeywords" th:value="${selectedSubkeywords}" />





                <div class="col-md-3">
                    <label for="city" class="form-label">Cidade</label>
                    <select id="city" name="city" class="form-select">
                        <option value="">-- Selecione --</option>
                        <option th:each="c : ${cities}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCity}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="institute" class="form-label">Instituto</label>
                    <select id="institute" name="institute" class="form-select">
                        <option value="">-- Selecione --</option>
                        <option th:each="inst : ${institutes}" th:value="${inst}" th:text="${inst}" th:selected="${inst == selectedInstitute}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="startDate" class="form-label">Data Início</label>
                    <input type="date" id="startDate" name="startDate" class="form-control" th:value="${startDate}" />
                </div>

                <div class="col-md-3">
                    <label for="endDate" class="form-label">Data Fim</label>
                    <input type="date" id="endDate" name="endDate" class="form-control" th:value="${endDate}" />
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary w-10">Buscar</button>

                <!-- Botão para limpar a seleção -->
                <div class="button-container-clear">
                <button class="btn-clear" onclick="resetFilters()">
                    <!-- Ícone da vassoura (SVG) -->
                    <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="20"
                            viewBox="0 0 20 20"
                            height="20"
                            fill="none"
                            class="svg-icon"
                    >
                        <g stroke-width="1.5" stroke-linecap="round" stroke="#ff342b">
                            <path
                                    d="m3.33337 10.8333c0 3.6819 2.98477 6.6667 6.66663 6.6667 3.682 0 6.6667-2.9848 6.6667-6.6667 0-3.68188-2.9847-6.66664-6.6667-6.66664-1.29938 0-2.51191.37174-3.5371 1.01468"
                            ></path>
                            <path
                                    d="m7.69867 1.58163-1.44987 3.28435c-.18587.42104.00478.91303.42582 1.0989l3.28438 1.44986"
                            ></path>
                        </g>
                    </svg>
                    <!-- Texto do botão -->
                    <span class="lable-clear">Limpar Seleção</span>
                </button>
                </div>

            </div>


            <div class="mt-4">
                <label class="form-label">Pastas</label>
                <div class="border rounded p-3 bg-white" style="max-height: 300px; overflow-y: auto;">
                    <div class="form-check-all d-flex justify-content-between align-items-center">
                        <div>
                            <input type="checkbox" id="checkAllFolders" onclick="toggleAllFolders(this)" class="form-check-input me-2" />
                            <label for="checkAllFolders" class="form-check-label">Selecionar Todas</label>
                        </div>
                    </div>

                    <ul class="mb-0" style="padding-left: 0;">
                        <li th:each="folder : ${folders}">
                            <span class="toggle me-1" onclick="toggleSubfolders(this)">&#x25B6;</span>
                            <label>
                                <input type="checkbox" name="folders" class="folder-checkbox" th:value="${folder.path}" th:checked="${#lists.contains(selectedFolders ?: {}, folder.path)}" />
                                <span th:text="${folder.name}"></span>
                            </label>
                            <ul class="folder-children" style="display:none;" th:if="${folder.subFolders}" th:insert="~{this :: renderSubFolders(${folder.subFolders}, ${selectedFolders})}"></ul>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary w-100">Buscar</button>
            </div>
        </form>

        <!-- Resultados -->
        <form th:action="@{/explorer/download-zip}" method="post" id="downloadZipForm">
            <div th:if="${files != null}">
                <h3>Resultados</h3>
                <div th:if="${files.size() == 0}">
                    <p>Nenhum arquivo encontrado.</p>
                </div>
                <ul th:if="${files.size() > 0}" class="list-group">
                    <div class="form-check-all">
                        <input type="checkbox" id="checkAllFiles" onclick="toggleAllFiles(this)" class="form-check-input me-2" />
                        <label for="checkAllFiles" class="form-check-label">Selecionar Todos os Arquivos</label>
                    </div>
                    <li class="list-group-item d-flex justify-content-between align-items-center" th:each="file : ${files}">
                        <div>
                            <input type="checkbox" name="files" class="file-checkbox" th:value="${file.fullPath}" />
                            <strong th:text="${file.name}"></strong><br />
                            <small th:text="${file.relativePath}"></small>
                        </div>
                        <div>
                            <a th:href="@{/view(path=${file.fullPath})}" target="_blank" class="btn btn-sm btn-outline-primary">Visualizar</a>
                            <a th:href="@{'/explorer/download'(path=${file.fullPath})}" class="btn btn-sm btn-success">Download</a>
                        </div>
                    </li>
                </ul>
                <div class="d-flex flex-wrap gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Baixar Arquivos Selecionados (ZIP)</button>
                </div>
            </div>
        </form>

        <form th:action="@{/explorer/download-folders}" method="post" onsubmit="return prepareSelectedFoldersDownload();" style="margin-top: 15px;">
            <input type="hidden" name="selectedFolders" id="selectedFoldersInputTop" />
            <button type="submit" class="btn btn-success">
                <i class="fas fa-download"></i> Baixar Pastas Selecionadas (ZIP)
            </button>
        </form>
    </div>

    <script>
        function toggleSubfolders(element) {
            const nextUl = element.parentElement.querySelector('.folder-children');
            if (!nextUl) return;

            if (nextUl.style.display === 'none' || nextUl.style.display === '') {
                nextUl.style.display = 'block';
                element.innerHTML = '&#x25BC;';
            } else {
                nextUl.style.display = 'none';
                element.innerHTML = '&#x25B6;';
            }
        }

        function toggleAllFolders(master) {
            const checkboxes = document.querySelectorAll('.folder-checkbox');
            checkboxes.forEach(cb => cb.checked = master.checked);
        }

        function toggleAllFiles(master) {
            const checkboxes = document.querySelectorAll('.file-checkbox');
            checkboxes.forEach(cb => cb.checked = master.checked);
        }

    document.getElementById('keyword').addEventListener('change', function() {
    const keyword = this.value;
    const container = document.getElementById('subkeywords-container');
    const subkeywordsList = document.getElementById('subkeywords-list');

    // Limpa as subpalavras anteriores
    subkeywordsList.innerHTML = '';

    if (keyword) {
        fetch(`/advanced-search/advanced/subkeywords?keyword=${encodeURIComponent(keyword)}`)
            .then(response => response.json())  // Espera o retorno como JSON
            .then(data => {
                if (data.length === 0) {
                    subkeywordsList.innerHTML = '<p class="text-muted">Nenhuma subpalavra encontrada.</p>';
                } else {
                    data.forEach((sub, index) => {
                        const checkboxId = 'sub_' + index;

                        // Cria o checkbox
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.name = 'selectedSubkeywords';
                        checkbox.value = sub;
                        checkbox.id = checkboxId;
                        checkbox.className = 'form-check-input me-2';

                        // Cria o label
                        const label = document.createElement('label');
                        label.htmlFor = checkboxId;
                        label.className = 'form-check-label me-3';
                        label.textContent = sub;

                        // Verifica se a subpalavra já foi selecionada
                        const selectedSubkeywords = JSON.parse(document.getElementById("selectedSubkeywords").value || "[]");
                        if (selectedSubkeywords.includes(sub)) {
                            checkbox.checked = true;  // Marca o checkbox se a subpalavra estiver selecionada
                        }

                        // Agrupa os dois
                        const div = document.createElement('div');
                        div.className = 'form-check mb-2';
                        div.appendChild(checkbox);
                        div.appendChild(label);

                        // Adiciona no container
                        subkeywordsList.appendChild(div);
                    });
                }
            })
            .catch(error => {
                console.error('Erro ao carregar subpalavras:', error);
                subkeywordsList.innerHTML = '<p class="text-danger">Erro ao carregar subpalavras.</p>';
            });
    } else {
        // Se não houver palavra-chave selecionada, exibe uma mensagem
        subkeywordsList.innerHTML = "<p class='text-muted'>Selecione uma palavra-chave para ver as subpalavras.</p>";
    }
});


// Resetando os filtros
function resetFilters() {
    // Reseta todos os campos do formulário
    document.querySelector("form").reset();

    // Limpa o conteúdo do container de subpalavras, se houver
    const container = document.getElementById('subkeywords-container');
    container.innerHTML = '';

    // Limpa a seleção de subpalavras
    document.querySelectorAll('input[name="selectedSubkeywords"]').forEach(checkbox => {
        checkbox.checked = false;
    });

    // Mantém a opção "Selecione uma palavra-chave" como padrão
    document.getElementById("keyword").value = ""; // Para garantir que a opção padrão seja selecionada
}


    </script>

    <th:block th:fragment="renderSubFolders(subfolders, selectedFolders)">
        <li th:each="sub : ${subfolders}">
            <span class="toggle" onclick="toggleSubfolders(this)">&#x25B6;</span>
            <label>
                <input type="checkbox" name="folders" class="folder-checkbox" th:value="${sub.path}" th:checked="${#lists.contains(selectedFolders ?: {}, sub.path)}" />
                <span th:text="${sub.name}"></span>
            </label>
            <ul class="folder-children" style="display:none;" th:if="${sub.subFolders}" th:insert="~{this :: renderSubFolders(${sub.subFolders}, ${selectedFolders})}"></ul>
        </li>
    </th:block>


    </body>
    </html>
