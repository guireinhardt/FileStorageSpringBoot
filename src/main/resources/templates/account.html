<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="card p-4 shadow-sm">
        <h1 class="mb-4 text-center">Minha Conta</h1>

        <form th:action="@{/auth/account}" method="post">

            <!-- Exibir nome de usuário como texto fixo -->
            <div class="mb-3">
                <label class="form-label">Nome de Usuário</label>
                <p class="form-control-plaintext" th:text="${user.username}"></p>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Nova Senha</label>
                <input type="password" name="password" id="password" placeholder="Nova senha" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100 mb-3">
                <i class="fas fa-save me-2"></i> Atualizar Dados
            </button>

            <div th:if="${success}" class="alert alert-success text-center" role="alert">
                Dados atualizados com sucesso!
            </div>
        </form>

        <a href="/admin/users" class="btn btn-secondary w-100">
            <i class="fas fa-arrow-left me-2"></i> Voltar
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
