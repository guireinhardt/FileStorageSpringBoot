<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/users.css">
</head>
<body>
<div class="container">
    <h1>Minha Conta</h1>
    <form th:action="@{/auth/account}" method="post">
        <label for="username">Nome de Usuário</label>
        <input type="text" name="username" id="username" th:value="${user.username}" required>

        <label for="password">Nova Senha</label>
        <input type="password" name="password" id="password" placeholder="Nova senha" required>

        <button type="submit">Atualizar Dados</button>

        <div th:if="${success}" style="color: green;">Dados atualizados com sucesso!</div>
    </form>


    <p>
        <a href="/">Voltar</a>
    </p>
</div>
</body>
</html>
