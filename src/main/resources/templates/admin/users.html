<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administração de Usuários</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Lista de Usuários</h2>

    <div th:if="${param.success}">
        <div class="alert alert-success">Senha atualizada com sucesso!</div>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Usuário</th>
            <th>Role</th>
            <th>Nova Senha</th>
            <th>Ação</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td th:text="${user.role}"></td>
            <td>
                <form th:action="@{'/auth/admin/users/' + ${user.id} + '/change-password'}" method="post" class="d-flex">
                    <input type="password" name="newPassword" class="form-control" placeholder="Nova senha" required>
                    <button type="submit" class="btn btn-warning ms-2">Alterar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
