<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administração de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Administração de Usuários</h1>

    <!-- Link para adicionar um novo usuário -->
    <a href="/auth/register" class="btn btn-success mb-3">Adicionar Novo Usuário</a>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.nome}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.role}"></td>
            <td th:text="${user.enabled} ? 'Ativo' : 'Desabilitado'"></td>
            <td>
                <!-- Link para editar o usuário -->
                <!-- Link para detalhes do usuário -->
                <a th:href="@{'/auth/admin/users/' + ${user.id} + '/details-edit'}" class="btn btn-sm btn-info">Editar</a>


                <!-- Excluir -->
                <form th:action="@{'/auth/admin/users/' + ${user.id} + '/delete'}" method="post" style="display:inline;" onsubmit="return confirm('Tem certeza que deseja excluir?');">
                    <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                </form>

                <!-- Ativar/Desativar -->
                <form th:action="@{'/auth/admin/users/' + ${user.id} + '/toggle-status'}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm" th:classappend="${user.enabled} ? 'btn-warning' : 'btn-success'"
                            th:text="${user.enabled} ? 'Desativar' : 'Ativar'"></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Voltar</a>
</div>
<div th:if="${error}">
    <div class="alert alert-danger" role="alert">
        <strong>Erro:</strong> <span th:text="${error}"></span>
    </div>
</div>

</body>
</html>
