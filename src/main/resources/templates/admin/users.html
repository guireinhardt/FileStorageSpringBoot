<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Administração de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/adminUsers.css">
</head>
<body>
<!-- Navbar -->
<div class="navbar">
    <!-- Logo à esquerda -->
    <div class="navbar-logo">
        <img src="/images/agri_.png" alt="Logo">
    </div>

    <!-- Container de itens à direita -->
    <div class="navbar-right">
        <a th:href="@{/search}">Buscar</a>
        <a th:href="@{/advanced-search}">Busca Avançada</a>
        <a th:href="@{/storage/trash}">Lixeira</a> <!-- Link para a Lixeira -->

        <div class="user-menu">
            <div class="user-icon">
                <img src="/images/user.jpg" alt="Perfil" class="profile-pic">
            </div>
            <div class="dropdown-content" id="dropdownMenu" style="display: none;">
                <a href="/auth/account"><i class="fas fa-user-cog"></i> Alterar Dados</a>

                <!-- Exibe somente se for ADMIN -->
                <div sec:authorize="hasRole('ADMIN')">
                    <a href="/auth/admin/users"><i class="fas fa-users-cog"></i> Gerenciar Usuários</a>
                </div>

                <a href="/auth/logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5">
    <h1 class="mb-4">Administração de Usuários</h1>

    <!-- Link para adicionar um novo usuário -->
    <a href="/auth/register" class="btn btn-glow mb-3">Adicionar Novo Usuário</a>

    <!-- Filtros de Usuários -->
    <form method="get" th:action="@{/admin/users}">
        <div class="row mb-4">
            <div class="col-md-4">
                <label for="statusFilter">Filtrar por Status:</label>
                <select id="statusFilter" name="status" class="form-control">
                    <option value="all">Todos</option>
                    <option value="active">Ativos</option>
                    <option value="inactive">Inativos</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="roleFilter">Filtrar por Role:</label>
                <select id="roleFilter" name="role" class="form-control">
                    <option value="all">Todos</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="USERS">USERS</option>
                    <option value="PUBLICO">PUBLICO</option>
                </select>
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary mt-4">Filtrar</button>
            </div>
        </div>
    </form>

    <!-- Botões de Exportação -->
    <div class="row mb-4">
        <div class="col-md-4">
            <a href="/admin/users/export-pdf" class="btn btn-danger">Exportar em PDF</a>
        </div>
        <div class="col-md-4">
            <a href="/admin/users/export-csv" class="btn btn-success">Exportar em CSV</a>
        </div>
    </div>

    <!-- Tabela de usuários -->
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.nome}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.role}"></td>
            <td th:text="${user.enabled} ? 'Ativo' : 'Desabilitado'"></td>
            <td>
                <a th:href="@{'/auth/admin/users/' + ${user.id} + '/details-edit'}" class="btn btn-sm btn-info">Editar</a>

                <form th:action="@{'/auth/admin/users/' + ${user.id} + '/delete'}" method="post" style="display:inline;" onsubmit="return confirm('Tem certeza que deseja excluir?');">
                    <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                </form>

                <form th:action="@{'/auth/admin/users/' + ${user.id} + '/toggle-status'}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm" th:classappend="${user.enabled} ? 'btn-warning' : 'btn-success'"
                            th:text="${user.enabled} ? 'Desativar' : 'Ativar'"></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Voltar</a>
</div>

<div th:if="${error}">
    <div class="alert alert-danger" role="alert">
        <strong>Erro:</strong> <span th:text="${error}"></span>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const userIcon = document.querySelector(".user-icon");
        const dropdownMenu = document.getElementById("dropdownMenu");

        userIcon.addEventListener("click", function() {
            // Alternar a visibilidade do dropdown
            if (dropdownMenu.style.display === "none" || dropdownMenu.style.display === "") {
                dropdownMenu.style.display = "block";
            } else {
                dropdownMenu.style.display = "none";
            }
        });

        // Fechar o dropdown se o usuário clicar fora do menu
        window.addEventListener("click", function(event) {
            if (!userIcon.contains(event.target) && !dropdownMenu.contains(event.target)) {
                dropdownMenu.style.display = "none";
            }
        });
    });
</script>

</body>
</html>
