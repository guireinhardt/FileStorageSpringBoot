<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Explorador de Arquivos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .file-actions button,
        .file-actions a {
            margin-left: 5px;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2>Explorador de Arquivos</h2>

    <form id="downloadForm" method="post" action="/explorer/download-zip">
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="selectAll">
            <label class="form-check-label" for="selectAll">Selecionar Todos</label>
        </div>

        <ul class="list-group" th:if="${files != null}">
            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="file : ${files}">
                <div>
                    <input type="checkbox" name="files" th:value="${file.fullPath}" class="form-check-input me-2 file-checkbox"/>
                    <span th:text="${file.name}"></span>
                </div>

                <div class="file-actions">
                    <a class="btn btn-sm btn-outline-primary"
                       th:if="${!file.folder}"
                    th:href="@{/explorer/view(path=${file.fullPath})}" target="_blank">
                    Visualizar
                    </a>

                    <a class="btn btn-sm btn-outline-success"
                       th:if="${!file.folder}"
                    th:href="@{/explorer/download(path=${file.fullPath})}">
                    Download
                    </a>


                </div>
            </li>

        </ul>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Download Selecionados</button>
        </div>
    </form>
</div>

<script>
    // Selecionar todos os checkboxes
    document.getElementById('selectAll').addEventListener('change', function () {
        const checkboxes = document.querySelectorAll('.file-checkbox');
        checkboxes.forEach(cb => cb.checked = this.checked);
    });

    // Verificar se há arquivos selecionados antes de submeter
    document.getElementById('downloadForm').addEventListener('submit', function (e) {
        const checked = document.querySelectorAll('.file-checkbox:checked');
        if (checked.length === 0) {
            e.preventDefault();
            alert("Selecione ao menos um arquivo para download.");
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
