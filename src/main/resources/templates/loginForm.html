<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css"> <!-- Link para o CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome para ícones -->
</head>
<body>
<div class="background">
    <div class="login-container">
        <div class="form-side">
            <img src="/images/agri_.png" alt="Logo" class="logo"> <!-- Logo centralizado -->
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user icon-left"></i>
                    <input type="text" id="login" placeholder="Usuário" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock icon-left"></i>
                    <input type="password" placeholder="Senha" required id="password">
                    <button type="button" id="togglePassword" class="toggle-password">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
</div>

<!-- Área para mensagens de erro -->
<div id="error-message" class="alert alert-danger" style="display:none;">
    <strong>Erro:</strong> <span id="error-message-text"></span>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    });

    // Lógica para o formulário de login
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
    event.preventDefault();
    const login = document.getElementById('login').value;
    const password = document.getElementById('password').value;

    // Limpa a mensagem de erro antes de cada novo envio
    const errorMessage = document.getElementById('error-message');
    errorMessage.style.display = 'none'; // Esconde a mensagem de erro

    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include',
            body: JSON.stringify({ login, password })
        });

        if (response.ok) {
            const data = await response.json();  // Pega token + role
            localStorage.setItem('token', data.token);  // Salva o token para usar depois

            // Redireciona conforme a role:
            switch(data.role) {
                case 'ROLE_ADMIN':
                    window.location.href = '/';
                    break;
                case 'ROLE_USERS':
                    window.location.href = '/';
                    break;
                case 'ROLE_PUBLICO':
                    window.location.href = '/public/index';
                    break;
                default:
                    window.location.href = '/';
                    break;
            }
        } else {
            // Se o erro for 401 (Unauthorized), exibe a mensagem de erro recebida do backend
            const errorData = await response.json(); // Obtém a mensagem de erro do backend
            errorMessage.textContent = errorData.message; // Exibe a mensagem do backend
            errorMessage.style.display = 'block'; // Torna o erro visível

            // Limpa os campos de login e senha
            document.getElementById('login').value = '';
            document.getElementById('password').value = '';
            alert('Erro ao fazer login:', errorData)
        }
    } catch (error) {
        console.error('Erro ao fazer login:', error);
        alert('Erro inesperado. Tente novamente.');
    }
});

</script>

</body>
</html>
