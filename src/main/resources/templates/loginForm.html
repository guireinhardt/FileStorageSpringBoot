<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css"> <!-- Seu CSS original -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome -->
</head>
<body>
<div class="background">
    <div class="login-container">
        <div class="form-side">
            <img src="/images/agri_.png" alt="Logo" class="logo"> <!-- Logo centralizado -->
            <h2>Login</h2>
            <form id="loginForm" novalidate>
                <div class="input-group">
                    <i class="fas fa-user icon-left"></i>
                    <input type="text" id="login" placeholder="Usuário" required autocomplete="username">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock icon-left"></i>
                    <input type="password" placeholder="Senha" required id="password" autocomplete="current-password">
                    <button type="button" id="togglePassword" class="toggle-password" aria-label="Mostrar/Ocultar senha">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <button type="submit">Entrar</button>
            </form>

            <!-- Mensagem de erro logo abaixo do form, com classes para seu CSS -->
            <div id="error-message" class="alert alert-danger" style="display:none; margin-top: 10px;">
                <strong>Erro:</strong> <span id="error-message-text"></span>
            </div>
        </div>
    </div>
</div>

<script>
    // Mostrar/ocultar senha
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    });

    // Login form submit
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        const errorMessage = document.getElementById('error-message');
        const errorMessageText = document.getElementById('error-message-text');

        errorMessage.style.display = 'none';
        errorMessageText.textContent = '';

        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;

        if (!login || !password) {
            errorMessageText.textContent = 'Por favor, preencha usuário e senha.';
            errorMessage.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ login, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.token);

                switch (data.role) {
                    case 'ROLE_ADMIN':
                    case 'ROLE_USERS':
                        window.location.href = '/';
                        break;
                    case 'ROLE_PUBLICO':
                        window.location.href = '/public/index';
                        break;
                    default:
                        window.location.href = '/';
                        break;
                }
            } else {
                const errorData = await response.json();
                errorMessageText.textContent = errorData.message || 'Usuário ou senha incorretos.';
                errorMessage.style.display = 'block';

                // Limpa os campos
                document.getElementById('login').value = '';
                document.getElementById('password').value = '';
            }
        } catch (error) {
            errorMessageText.textContent = 'Erro inesperado, tente novamente.';
            errorMessage.style.display = 'block';
        }
    });
</script>
</body>
</html>
