<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
<h2>Login</h2>
<form id="loginForm" th:action="@{/auth/login}" method="post">
    <label for="login">Usuário:</label>
    <input type="text" id="login" name="login" required>
    <br>
    <label for="password">Senha:</label>
    <input type="password" id="password" name="password" required>
    <br>
    <button type="submit">Entrar</button>
</form>
<p>Não tem uma conta? <a th:href="@{/auth/register}">Registre-se</a></p>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const login = document.getElementById('login').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include', // Envia e aceita cookies (importantíssimo para cookies com HttpOnly)
                body: JSON.stringify({ login, password })
            });

            if (response.ok) {
                console.log('Login bem-sucedido!');
                alert('Login realizado com sucesso!');
                window.location.href = '/'; // Redireciona para página protegida
            } else {
                alert('Falha no login. Verifique suas credenciais.');
            }
        } catch (error) {
            console.error('Erro ao fazer login:', error);
            alert('Erro inesperado. Tente novamente.');
        }
    });

    // Exemplo de chamada para rota protegida usando cookie
    async function fetchProtectedResource() {
        const response = await fetch('/', { // Substitua pela URL real da sua API
            method: 'GET',
            credentials: 'include' // Garante que o cookie vai junto
        });

        if (response.ok) {
            const data = await response.json(); // ou .text() se for resposta em texto
            console.log('Dados protegidos:', data);
        } else {
            console.error('Erro ao acessar recurso protegido:', response.status);
        }
    }

    // (opcional) Pode chamar isso após o login se quiser testar
    // fetchProtectedResource();
</script>
</body>
</html>
