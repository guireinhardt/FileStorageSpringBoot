<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Quantidade de Buscas</title>
    <!-- Adicionando o Bootstrap para melhorar a visualização -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <!-- Título -->
    <h1 class="mb-4 text-center">Relatório de Buscas por Palavra-chave</h1>

    <!-- Exibindo o período selecionado -->
    <p class="text-center">Período: <span th:text="${period}">7</span> dias</p>

    <!-- Mensagem de "sem dados" se a lista estiver vazia -->
    <p th:if="${#lists.isEmpty(searchCountByKeyword)}" class="text-center text-danger">Nenhum dado para o período selecionado.</p>

    <!-- Tabela só aparece quando há dados -->
    <table class="table table-striped table-bordered" th:if="${!#lists.isEmpty(searchCountByKeyword)}">
        <thead>
        <tr>
            <th>Palavra-chave</th>
            <th>Quantidade de Buscas</th>
        </tr>
        </thead>
        <tbody>
        <!-- Iteração do Map<String, Long> -->
        <tr th:each="e : ${searchCountByKeyword}">
            <td th:text="${e.key}">palavra</td>  <!-- Exibe a chave (palavra-chave) -->
            <td th:text="${e.value}">0</td>     <!-- Exibe o valor (quantidade de buscas) -->
        </tr>
        </tbody>
    </table>

    <!-- Botão para exportação, com link dinâmico -->
    <div class="d-flex justify-content-center mt-4">
        <a th:href="@{/dashboard/export-search-count(period=${period})}" class="btn btn-success">Exportar CSV</a>
    </div>
</div>

<!-- Bootstrap JS (para funcionalidades de botão, modal, etc.) -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
