<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Acessos Diários</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container mt-5">
    <h1>Relatório de Acessos por Dia</h1>

    <p>Período: <span th:text="${period}"></span> dias</p>

    <!-- Canvas para o gráfico -->
    <canvas id="accessesChart" width="400" height="200"></canvas>

    <script th:inline="javascript">
        /* Dados passados pelo controller para o template */
        var dailyAccessData = /*[[${dailyAccessData}]]*/ []; // Recebendo os dados

        // Preparando os dados para o gráfico
        var labels = dailyAccessData.map(function(item) { return item.date; });
        var data = dailyAccessData.map(function(item) { return item.count; });

        // Criando o gráfico com Chart.js (gráfico de barras)
        var ctx = document.getElementById('accessesChart').getContext('2d');
        var accessesChart = new Chart(ctx, {
            type: 'bar', // Tipo do gráfico (barra)
            data: {
                labels: labels, // As datas
                datasets: [{
                    label: 'Acessos Diários',
                    data: data, // A contagem de acessos
                    backgroundColor: 'rgba(75, 192, 192, 0.2)', // Cor das barras
                    borderColor: 'rgb(75, 192, 192)', // Cor da borda
                    borderWidth: 1 // Largura da borda
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true // Começa a escala do eixo Y no zero
                    }
                }
            }
        });
    </script>
</div>
</body>
</html>
