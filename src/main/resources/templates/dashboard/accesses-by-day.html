<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Acessos Diários</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/access.css"> <!-- Referência ao arquivo CSS externo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Bootstrap 5 -->
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4 text-center">Relatório de Acessos por Dia</h1>

    <!-- Informações sobre o período -->
    <p class="text-center">Período: <span id="periodDisplay" th:text="${period}">7</span> dias</p>

    <!-- Filtros de Período (7, 30, 60 e 90 dias) -->
    <div class="d-flex justify-content-center mb-4">
        <button type="button" class="btn btn-outline-primary mx-2" onclick="changePeriod(7)">Últimos 7 dias</button>
        <button type="button" class="btn btn-outline-primary mx-2" onclick="changePeriod(30)">Últimos 30 dias</button>
        <button type="button" class="btn btn-outline-primary mx-2" onclick="changePeriod(60)">Últimos 60 dias</button>
        <button type="button" class="btn btn-outline-primary mx-2" onclick="changePeriod(90)">Últimos 90 dias</button>
    </div>

    <!-- Botão de Exportação -->
    <div class="d-flex justify-content-center mb-4">
        <a href="#" class="btn btn-success">Exportar Relatório</a>
    </div>

    <!-- Canvas para o gráfico -->
    <div class="chart-container">
        <canvas id="accessesChart" width="400" height="200"></canvas>
    </div>
</div>

<script>
    // O Thymeleaf vai gerar um JSON válido e inseri-lo diretamente no JavaScript
    var accessesByDay = /*[[${accessesByDay}]]*/; // Passando a string JSON gerada pelo Thymeleaf

    // A linha acima pode ter escapado os caracteres especiais. Para evitar isso, use a sintaxe correta para injetar o JSON
    var accessesByDay = /*[[${accessesByDay}]]*/;  // Agora é a forma correta de injetar o JSON

    // Verifique se os dados estão corretos
    console.log(accessesByDay);  // Para garantir que o JSON foi injetado corretamente

    // Convertendo a string JSON em um objeto JavaScript
    var parsedAccessesByDay = JSON.parse(accessesByDay);  // Converte a string JSON em um objeto JavaScript

    // Agora podemos extrair as labels e os dados corretamente
    var labels = Object.keys(parsedAccessesByDay);  // Obtendo as datas
    var data = Object.values(parsedAccessesByDay);  // Obtendo as contagens de acessos

    // Inicializando o gráfico
    var accessesChart;
    var ctx = document.getElementById('accessesChart').getContext('2d');

    // Função para atualizar o gráfico com os novos dados
    function updateChart(data) {
        if (accessesChart) {
            accessesChart.destroy(); // Remove o gráfico anterior
        }

        accessesChart = new Chart(ctx, {
            type: 'bar', // Tipo do gráfico (barra)
            data: {
                labels: data.labels, // As datas
                datasets: [{
                    label: 'Acessos Diários',
                    data: data.counts, // A contagem de acessos
                    backgroundColor: 'rgba(75, 192, 192, 0.2)', // Cor das barras
                    borderColor: 'rgb(75, 192, 192)', // Cor da borda
                    borderWidth: 1, // Largura da borda
                    barThickness: 8, // Controla a largura das barras
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true, // Começa a escala do eixo Y no zero
                        ticks: {
                            stepSize: 1 // Passo entre os valores do eixo Y
                        }
                    },
                    x: {
                        ticks: {
                            maxRotation: 45, // Rota os rótulos no eixo X se necessário
                            minRotation: 45,
                        }
                    }
                }
            }
        });
    }

    // Função para mudar o período e atualizar o gráfico sem recarregar a página
    function changePeriod(period) {
        document.getElementById("periodDisplay").innerText = period; // Atualiza o texto do período

        // Atualizando o gráfico com os novos dados
        updateChart({
            labels: labels,
            counts: data
        });
    }

    // Carregar os dados iniciais (últimos 7 dias)
    updateChart({
        labels: labels,
        counts: data
    });
</script>






<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
