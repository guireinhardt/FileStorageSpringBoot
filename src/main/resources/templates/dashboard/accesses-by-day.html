<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Acessos Diários</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/access.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4 text-center">Relatório de Acessos por Dia</h1>
    <p class="text-center">Período: <span id="periodDisplay">7</span> dias</p>

    <!-- Select para escolher o período -->
    <div class="d-flex justify-content-center mb-4">
        <select class="form-select" id="periodSelect" onchange="changePeriod(this.value)">
            <option value="7">Últimos 7 Dias</option>
            <option value="30">Últimos 30 Dias</option>
            <option value="60">Últimos 60 Dias</option>
            <option value="90">Últimos 90 Dias</option>
        </select>
    </div>

    <!-- Botão de exportação -->
    <div class="d-flex justify-content-center mb-4">
        <a id="exportBtn" href="/dashboard/export-accesses?period=7" class="btn btn-success">Exportar Relatório</a>
    </div>

    <!-- Canvas para o gráfico -->
    <div class="chart-container">
        <canvas id="accessesChart" width="600" height="400"></canvas>
    </div>
</div>

<script th:inline="javascript">
    // Dados passados do servidor (inicial)
    const chartData = /*[[${chartJson}]]*/ "{}";  // O Thymeleaf vai substituir isso com os dados reais
    const parsed = JSON.parse(chartData);  // Converte os dados JSON em objeto JavaScript

    let chart, ctx = document.getElementById('accessesChart').getContext('2d');

    // Função para renderizar o gráfico
    function render(data) {
        if (chart) {
            chart.destroy();  // Destruir o gráfico anterior antes de criar um novo
        }

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.labels,  // Labels (datas)
                datasets: [{
                    label: 'Acessos Diários',
                    data: data.counts,  // Contagem de acessos
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgb(75, 192, 192)',
                    borderWidth: 1,
                    barThickness: 8
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true },
                    x: { ticks: { maxRotation: 45, minRotation: 45 } }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(tooltipItem) {
                                return `Acessos: ${tooltipItem.raw}`;  // Exibe os números na tooltip
                            }
                        }
                    }
                }
            }
        });
    }

    // Renderização inicial do gráfico com os dados passados do servidor
    render(parsed);

    // Função para alterar o período do gráfico
    async function changePeriod(period) {
        document.getElementById('periodDisplay').innerText = period;  // Atualiza o período na tela
        try {
            // Atualiza o link de exportação com o novo período
            document.getElementById('exportBtn').href = `/dashboard/export-accesses?period=${period}`;

            // Realiza a requisição para a API com o novo período
            const res = await fetch(`/api/dashboard/accesses-by-day?period=${period}`);
            const json = await res.json();
            render(json);  // Atualiza o gráfico com os novos dados
        } catch (error) {
            console.error("Erro ao carregar os dados:", error);
            alert("Erro ao carregar os dados do gráfico.");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
