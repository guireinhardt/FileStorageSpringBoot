<!-- fragments.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"> <!-- CSS comum -->
    <title>Fragmentos de Navegação</title>
</head>
<body>

<!-- Fragmento para navegação de pastas -->
<div th:fragment="folderNavigation">
    <h3>Pastas</h3>
    <ul>
        <li th:each="folder : ${folders}">
            <a href="#" class="open-folder" th:data-folder="${folder.name}" th:text="${folder.name}"></a>
        </li>
    </ul>
</div>

<!-- Fragmento para listagem de arquivos -->
<div th:fragment="fileList">
    <h3>Arquivos</h3>
    <!-- Exibe a lista apenas se existirem arquivos -->
    <ul th:if="${files != null}">
        <li th:each="file : ${files}">
            <a th:href="@{/storage/download/{fileName}(fileName=${file.name})}">
                <i class="fas fa-file"></i> <!-- Ícone do arquivo -->
                <span th:text="${file.name}"></span>
            </a>
        </li>
    </ul>
    <!-- Exibe mensagem se não houver arquivos -->
    <p th:if="${files == null}">Nenhum arquivo encontrado.</p>
</div>

<!-- Voltar à página inicial -->
<a th:href="@{/}" class="back-btn">Voltar à Página Inicial</a>

</body>
</html>
