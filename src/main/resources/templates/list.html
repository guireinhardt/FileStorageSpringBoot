<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>MeuDrive</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- Caminho da pasta atual -->
<input type="hidden" id="folderPath" th:value="${currentFolder}">

<!-- Navbar -->
<div class="navbar">
    <!-- Logo à esquerda -->
    <div class="navbar-logo">
        <img src="/images/agri_.png" alt="Logo">
    </div>

    <!-- Container de itens à direita -->
    <div class="navbar-right">
        <a th:href="@{/search}">Buscar</a>
        <a th:href="@{/advanced-search}">Busca Avançada</a>

        <div class="user-menu">
            <div class="user-icon">
                <img src="/images/user.jpg" alt="Perfil" class="profile-pic">
            </div>
            <div class="dropdown-content" id="dropdownMenu" style="display: none;">
                <a href="/auth/account"><i class="fas fa-user-cog"></i> Alterar Dados</a>

                <!-- Exibe somente se for ADMIN -->
                <div sec:authorize="hasRole('ADMIN')">
                    <a href="/auth/admin/users"><i class="fas fa-users-cog"></i> Gerenciar Usuários</a>
                </div>

                <a href="/auth/logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </div>
    </div>
</div>




<!-- Conteúdo -->
<div class="container">
    <h1>MeuDrive</h1>
    <h2 th:text="'Pasta: ' + ${currentFolder}"></h2>

    <!-- Pastas -->
    <h2>Pastas</h2>
    <div class="folder-grid">
        <div th:each="folder : ${folders}" class="folder" style="position: relative;">
            <a th:href="@{/storage/openFolder/{folderName}(folderName=${folder.name})}" class="folder-link">
                <i class="fas fa-folder folder-icon"></i>
                <span class="folder-name" th:text="${folder.name}"></span>
            </a>
            <i class="fas fa-ellipsis-v ellipsis-icon"
               onclick="toggleActions(this)"></i>
            <div class="dropdown-content" style="display: none; position: absolute; right: 5px; top: 25px; background-color: white; border: 1px solid #ccc; z-index: 100;">
                <a href="#" th:attr="data-folder=${folder.name}" onclick="moveFolder(this)">Mover pasta</a>
                <a href="#" th:attr="data-folder-name=${folder.name}" onclick="handleDownload(this)">
                    <i class="fas fa-download"></i> Baixar pasta
                </a>
            </div>
        </div>
    </div>

    <!-- Arquivos -->
    <h2>Arquivos</h2>
    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="file : ${files}">
            <td th:text="${file.name}"></td>
            <td>
                <a href="#" class="btn-download" th:attr="data-file=${file.name}"><i class="fas fa-download"></i></a>
                <a href="#" class="btn-view"   th:attr="data-file=${file.name}"><i class="fas fa-eye"></i></a>
                <a href="#" class="btn-rename" th:attr="data-file=${file.name}"><i class="fas fa-edit"></i></a>
                <a href="#" class="btn-share" th:attr="data-file=${file.name}" onclick="shareFileFromButton(this)" title="Compartilhar">
                    <i class="fas fa-share-alt"></i>
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Modal de Criação de Pasta -->
<button
        id="btnNovaPasta"
        type="button"
        class="btn btn-warning btn-flutuante"
        title="Criar nova pasta"
        data-bs-toggle="modal"
        data-bs-target="#modalNovaPasta"
>
    <i class="fas fa-folder-plus"></i>
</button>

<!-- Modal de Criação de Pasta -->
<div class="modal fade" id="modalNovaPasta" tabindex="-1" aria-labelledby="modalNovaPastaLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="modalNovaPastaLabel">Criar Nova Pasta</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <form id="formNovaPasta" method="post" th:action="@{/storage/createFolder}">
                    <input type="hidden" name="currentFolder" th:value="${currentFolder}">
                    <input type="text" name="folderName" class="form-control mb-3" placeholder="Nome da nova pasta" required>
                    <button type="submit" class="btn btn-warning">Criar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Renomear Arquivo -->
<div class="modal fade" id="modalRenameFile" tabindex="-1" aria-labelledby="modalRenameFileLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalRenameFileLabel">Renomear Arquivo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <form id="renameForm" method="post">
                    <input type="hidden" name="oldFileName" id="oldFileName">
                    <input type="text" name="newFileName" id="newFileName" class="form-control mb-3" placeholder="Novo nome" required>
                    <button type="submit" class="btn btn-warning">Renomear</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Mover Pasta -->
<div class="modal fade" id="moveModal" tabindex="-1" aria-labelledby="moveModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="moveModalLabel">Mover pasta: <span id="modalFolderName"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <label for="destinationSelect" class="form-label">Mover para:</label>
                <select id="destinationSelect" class="form-select">
                    <!-- opções serão preenchidas dinamicamente -->
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="confirmMove()">Mover</button>
            </div>
        </div>
    </div>
</div>

<!-- Rodapé -->
<div class="footer">
    &copy; 2025 MeuDrive - Todos os direitos reservados
</div>

<script src="/js/list.js"></script>
</body>
</html>
