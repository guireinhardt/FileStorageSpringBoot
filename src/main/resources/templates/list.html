<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>MeuDrive</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Caminho da pasta atual -->
<input type="hidden" id="folderPath" th:value="${currentFolder}">

<!-- Navbar -->
<div class="navbar">
    <!-- Logo à esquerda -->
    <div class="navbar-logo">
        <img src="/images/agri_.png" alt="Logo">
    </div>

    <!-- Container de itens à direita -->
    <div class="navbar-right">
        <a th:href="@{/search}">Buscar</a>
        <a th:href="@{/advanced-search}">Busca Avançada</a>
        <a th:href="@{/storage/trash}">Lixeira</a> <!-- Link para a Lixeira -->

        <div class="user-menu">
            <div class="user-icon">
                <img src="/images/user.jpg" alt="Perfil" class="profile-pic">
            </div>
            <div class="dropdown-content" id="dropdownMenu" style="display: none;">
                <a href="/auth/account"><i class="fas fa-user-cog"></i> Alterar Dados</a>

                <!-- Exibe somente se for ADMIN -->
                <div sec:authorize="hasRole('ADMIN')">
                    <a href="/auth/admin/users"><i class="fas fa-users-cog"></i> Gerenciar Usuários</a>
                </div>

                <a href="/auth/logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </div>
    </div>
</div>

<!-- Conteúdo -->
<div class="container">
    <h1>MeuDrive</h1>
    <!--h2 th:text="'Pasta: ' + ${currentFolder}"></h2 -->

    <!-- Pastas -->
    <h2>Pastas</h2>
    <div class="folder-grid">
        <div th:each="folder : ${folders}" class="folder" style="position: relative;">
            <a th:href="@{/storage/openFolder/{folderName}(folderName=${folder.name})}" class="folder-link">
                <i class="fas fa-folder folder-icon"></i>
                <span class="folder-name" th:text="${folder.name}"></span>
            </a>
            <i class="fas fa-ellipsis-v ellipsis-icon" onclick="toggleActions(this)"></i>
            <div class="dropdown-content" style="display: none; position: absolute; right: 5px; top: 25px; background-color: white; border: 1px solid #ccc; z-index: 100;">
                <a href="#" th:attr="data-folder=${folder.name}" onclick="moveFolder(this)">Mover pasta</a>
                <a href="#" th:attr="data-folder-name=${folder.name}" onclick="handleDownload(this)">
                    <i class="fas fa-download"></i> Baixar pasta
                </a>
                <a href="#" th:attr="data-folder=${folder.name}" class="btn-trash" onclick="moveFolderToTrash(this)">
                    <i class="fas fa-trash-alt"></i> Mover para a Lixeira
                </a>
            </div>
        </div>
    </div>

    <!-- Arquivos -->
    <h2>Arquivos</h2>
    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="file : ${files}">
            <td th:text="${file.name}"></td>
            <td>
                <a href="#" class="btn-download" th:attr="data-file=${file.name}"><i class="fas fa-download"></i></a>
                <a href="#" class="btn-view" th:attr="data-file=${file.name}"><i class="fas fa-eye"></i></a>
                <a href="#" class="btn-rename" th:attr="data-file=${file.name}"><i class="fas fa-edit"></i></a>
                <a href="#" class="btn-share" th:attr="data-file=${file.name}" onclick="shareFileFromButton(this)" title="Compartilhar">
                    <i class="fas fa-share-alt"></i>
                </a>
                <!-- Botão para Mover para Lixeira -->
                <!-- Botão para Mover para Lixeira -->
                <a href="#" class="btn-delete" th:attr="data-path=${file.name}" onclick="moveToTrash(this)">
                    <i class="fas fa-trash-alt"></i>
                </a>

            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Modal de Criação de Pasta -->
<button
        id="btnNovaPasta"
        type="button"
        class="btn btn-warning btn-flutuante"
        title="Criar nova pasta"
        data-bs-toggle="modal"
        data-bs-target="#modalNovaPasta"
>
    <i class="fas fa-folder-plus"></i>
</button>

<!-- Modal de Criação de Pasta -->
<div class="modal fade" id="modalNovaPasta" tabindex="-1" aria-labelledby="modalNovaPastaLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="modalNovaPastaLabel">Criar Nova Pasta</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <form id="formNovaPasta" method="post" th:action="@{/storage/createFolder}">
                    <input type="hidden" name="currentFolder" th:value="${currentFolder}">
                    <input type="text" name="folderName" class="form-control mb-3" placeholder="Nome da nova pasta" required>
                    <button type="submit" class="btn btn-warning">Criar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Rodapé -->
<div class="footer">
    &copy; 2025 MeuDrive - Todos os direitos reservados
</div>

<script src="/js/list.js"></script>
<script>
    function moveToTrash(button) {
        const filePath = button.getAttribute('data-path'); // Aqui você vai pegar o path do arquivo ou pasta
        if (confirm(`Tem certeza que deseja mover ${filePath} para a Lixeira?`)) {
            fetch('/storage/delete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'  // Mudança para JSON
                },
                body: JSON.stringify({ path: filePath })  // Envia o caminho como JSON
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    alert(data.message); // Exibe a mensagem de sucesso
                    location.reload();  // Recarrega a página
                } else if (data.error) {
                    alert(data.error);  // Exibe erro
                }
            })
            .catch(error => {
                alert('Erro ao mover para a lixeira: ' + error);  // Exibe erro se a requisição falhar
            });
        }
    }

    function moveFolderToTrash(button) {
        const folderName = button.getAttribute('data-folder');
        if (confirm(`Tem certeza de que deseja mover a pasta ${folderName} para a Lixeira?`)) {
            // Enviar a requisição para mover a pasta para a lixeira
            fetch(`/storage/delete`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `folderPath=${folderName}`
            }).then(response => {
                if (response.ok) {
                    alert("Pasta movida para a lixeira com sucesso!");
                    location.reload(); // Atualizar a página após mover
                } else {
                    alert("Erro ao mover a pasta.");
                }
            });
        }
    }
    function toggleActions(element) {
    // Aqui você pode definir a lógica que deseja para mostrar ou ocultar o menu suspenso
    const dropdown = element.nextElementSibling;
    // Alterna a visibilidade do menu suspenso
    dropdown.style.display = (dropdown.style.display === 'none' || dropdown.style.display === '') ? 'block' : 'none';
}
</script>

</body>
</html>
