<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MeuDrive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">

</head>
<body>

<!-- Caminho da pasta atual -->
<input type="hidden" id="folderPath" th:value="${currentFolder}">

<div class="navbar">
    <img src="/images/agri_.png" alt="Logo" style="height:40px; margin-right:20px;">
    <div>
        <a th:href="@{/banco-de-imagens/search}">Banco de Imagens</a>
        <a th:href="@{/search}">Buscar</a>
        <a th:href="@{/upload}">Upload</a>
    </div>
    <div class="user-menu">
        <div class="user-icon" onclick="toggleDropdown()">
            <img src="/images/user.jpg" alt="Perfil" class="profile-pic">
        </div>
        <div class="dropdown-content" id="dropdownMenu">
            <a href="/auth/account"><i class="fas fa-user-cog"></i> Alterar Dados</a>
            <a href="/auth/logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </div>
</div>



<div class="container">
    <h1>MeuDrive</h1>
    <h2 th:text="'Pasta: ' + ${currentFolder}"></h2>

    <!-- Pastas -->
    <h2>Pastas</h2>
    <div class="folder-grid">
        <a th:each="folder : ${folders}" class="folder" th:href="@{/storage/openFolder/{folderName}(folderName=${folder.name})}">
            <i class="fas fa-folder fa-lg"></i>
            <span th:text="${folder.name}"></span>
        </a>
    </div>

    <!-- Arquivos -->
    <h2>Arquivos</h2>
    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="file : ${files}">
            <td th:text="${file.name}"></td>
            <td>
                <a href="#" class="btn-download" th:attr="data-file=${file.name}"><i class="fas fa-download"></i></a>
                <a href="#" class="btn-view" th:attr="data-file=${file.name}"><i class="fas fa-eye"></i></a>
                <a href="#" class="btn-rename" th:attr="data-file=${file.name}"><i class="fas fa-edit"></i></a>
                <!-- Botão de compartilhar -->
                <a href="#" class="btn-share" th:attr="data-file=${file.name}" onclick="shareFileFromButton(this)" title="Compartilhar">
                    <i class="fas fa-share-alt"></i>
                </a>


            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Barra de progresso -->
<div class="progress-bar" id="progressBar">
    <div class="progress-bar-fill" id="progressFill"></div>
</div>

<!-- Botão flutuante para criar pasta -->
<button id="btnNovaPasta" class="btn-flutuante" title="Criar nova pasta">
    <i class="fas fa-folder-plus"></i>
</button>

<!-- Modal de criação de pasta -->
<div id="modalNovaPasta" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>
        <h3>Criar Nova Pasta</h3>
        <form id="formNovaPasta" method="post" th:action="@{/storage/createFolder}">
            <input type="hidden" name="currentFolder" th:value="${currentFolder}">
            <input type="text" name="folderName" placeholder="Nome da nova pasta" required>
            <button type="submit">Criar</button>
        </form>
    </div>
</div>

<!-- Modal de renomear arquivo -->
<div id="modalRenameFile" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeRenameModal">&times;</span>
        <h3>Renomear Arquivo</h3>
        <form id="renameForm" method="post">
            <input type="hidden" name="oldFileName" id="oldFileName">
            <input type="text" name="newFileName" id="newFileName" placeholder="Novo nome" required>
            <button type="submit">Renomear</button>
        </form>
    </div>
</div>

<div class="footer">
    &copy; 2025 MeuDrive - Todos os direitos reservados
</div>

<script>
    // Toggle do menu do usuário
   function toggleDropdown() {
    const dropdown = document.getElementById("dropdownMenu");
    dropdown.style.display = (dropdown.style.display === "block") ? "none" : "block";
}

// Fecha o menu se clicar fora dele
window.addEventListener('click', function(e) {
    const menu = document.getElementById("dropdownMenu");
    const icon = document.querySelector(".user-icon");
    if (!icon.contains(e.target)) {
        menu.style.display = "none";
    }
});

    // Botão flutuante abre o modal de Nova Pasta
    document.getElementById("btnNovaPasta").addEventListener("click", function () {
        document.getElementById("modalNovaPasta").style.display = "block";
    });

    // Fecha o modal ao clicar no X
    document.getElementById("closeModal").addEventListener("click", function () {
        document.getElementById("modalNovaPasta").style.display = "none";
    });

    // Fecha o modal ao clicar fora dele
    window.addEventListener("click", function (event) {
        const modal = document.getElementById("modalNovaPasta");
        if (event.target === modal) {
            modal.style.display = "none";
        }
    });

    // Reforço: botão esc fecha o modal
    window.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
            document.getElementById("modalNovaPasta").style.display = "none";
        }
    });

    // Previne o comportamento padrão ao arrastar arquivos
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
        window.addEventListener(event, e => {
            e.preventDefault();
            e.stopPropagation();
        });
    });

    // Soltar arquivo na janela e realizar o upload
    window.addEventListener('drop', e => {
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            uploadFiles(files);
        }
    });

    // Função de upload dos arquivos
    function uploadFiles(files) {
        const folderPath = document.getElementById("folderPath").value;
        const formData = new FormData();
        formData.append("folderPath", folderPath);
        for (let i = 0; i < files.length; i++) {
            formData.append("files", files[i]);
        }

        // Mostrar barra de progresso
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        progressBar.style.display = 'block';
        progressFill.style.width = '0';
        progressFill.style.animation = 'loading 2s linear forwards';

        fetch("/storage/uploadFiles", {
            method: "POST",
            body: formData,
            credentials: "include"
        })
        .then(response => {
            if (!response.ok) throw new Error("Falha no upload");
            return response.text();
        })
        .then(() => {
            setTimeout(() => {
                progressBar.style.display = 'none';
                alert("Upload realizado com sucesso!");
                location.reload();
            }, 2000);
        })
        .catch(err => {
            progressBar.style.display = 'none';
            console.error("Erro:", err);
            alert("Erro ao enviar arquivos.");
        });
    }

    // Visualizar arquivo
    document.querySelectorAll('.btn-view').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const file = e.target.closest('a').getAttribute('data-file');
            window.open(`/view/${encodeURIComponent(file)}`, '_blank');
        });
    });

    // Download de arquivo
    document.querySelectorAll('.btn-download').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const file = e.target.closest('a').getAttribute('data-file');
            fetch(`/storage/downloadFile/${encodeURIComponent(file)}`, {
                method: 'GET',
                credentials: 'include'
            })
            .then(res => res.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = file;
                document.body.appendChild(a);
                a.click();
                a.remove();
            })
            .catch(err => alert("Erro ao baixar."));
        });
    });

    // Abrir modal de renomear ao clicar no ícone
    document.querySelectorAll('.btn-rename').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const fileName = e.target.closest('a').getAttribute('data-file');
            const fileNameWithoutExt = fileName.substring(0, fileName.lastIndexOf('.')); // Nome sem a extensão
            const fileExt = fileName.substring(fileName.lastIndexOf('.'));
            document.getElementById('oldFileName').value = fileName;
            document.getElementById('newFileName').value = fileNameWithoutExt;
            document.getElementById('modalRenameFile').style.display = 'block';
        });
    });

    // Fecha o modal de renomear ao clicar no X
    document.getElementById("closeRenameModal").addEventListener("click", function () {
        document.getElementById("modalRenameFile").style.display = "none";
    });

  // Enviar o formulário de renomear
document.getElementById('renameForm').addEventListener('submit', function (event) {
    event.preventDefault();

    const form = event.target;
    const oldFileName = form.oldFileName.value;
    const newFileName = form.newFileName.value;
    const folderPath = document.getElementById("folderPath").value;

    const isRoot = !folderPath || folderPath.trim() === "";

    const params = new URLSearchParams({
        oldFileName: oldFileName,
        newFileName: newFileName
    });

    const endpoint = isRoot
        ? `/storage/renameRootFile?${params.toString()}`
        : `/storage/renameFile?${params.toString()}`;

    fetch(endpoint, {
        method: 'PATCH'
    })
    .then(async response => {
        const isJson = response.headers.get("content-type")?.includes("application/json");
        const data = isJson ? await response.json() : null;

        if (!response.ok) {
            const errorMessage = data?.message || response.statusText;
            throw new Error(errorMessage);
        }

        return data;
    })
    .then(data => {
        if (data.success) {
            alert("Arquivo renomeado com sucesso!");
            location.reload();
        } else {
            alert("Erro ao renomear arquivo: " + data.message);
        }
    })
    .catch(err => {
        console.error("Erro:", err);
        alert("Erro ao renomear arquivo: " + err.message);
    });
});
    // Função chamada ao clicar no botão de compartilhar
function shareFileFromButton(button) {
    const fileName = button.getAttribute("data-file");

    // Crie o link de compartilhamento com base no nome do arquivo
    const fileLink = `/storage/view/${encodeURIComponent(fileName)}`;

    // Copie o link para a área de transferência
    navigator.clipboard.writeText(fileLink)
        .then(() => {
            alert('Link de compartilhamento copiado para a área de transferência!');
        })
        .catch(err => {
            alert('Falha ao copiar o link: ' + err);
        });
}





</script>

</body>
</html>
