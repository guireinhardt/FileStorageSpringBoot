<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lixeira</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/trash.css">
</head>
<body>
<!-- Navbar -->
<div class="navbar">
  <!-- Logo -->
  <div class="navbar-logo">
    <img src="/images/agri_.png" alt="Logo">
  </div>

  <!-- Menu de Navegação -->
  <div class="navbar-right">
    <a href="/" class="btn-home">
      <i class="fas fa-home"></i> Início
    </a>
  </div>
</div>

<!-- Conteúdo -->
<div class="container">
  <!-- Botão de Voltar ao Início -->

  <!-- Arquivos na Lixeira -->
  <div class="row mb-4">
    <div class="col-12">
      <h4 class="mb-3">Arquivos na Lixeira</h4>
      <table class="table table-bordered">
        <thead>
        <tr>
          <th>Nome do Arquivo</th>
          <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="file : ${trashFiles}">
          <tr>
            <td th:text="${file}"></td>
            <td>
              <div class="action-buttons">
                <form th:action="@{/storage/restoreFromTrash}" method="post" class="d-inline">
                  <input type="hidden" name="filePath" th:value="${file}" />
                  <button type="submit" class="btn btn-restore">
                    <i class="fas fa-undo"></i> Restaurar
                  </button>
                </form>
                <form th:action="@{/storage/deleteFromTrash}" method="post" class="d-inline">
                  <input type="hidden" name="filePath" th:value="${file}" />
                  <button type="submit" class="btn btn-delete">
                    <i class="fas fa-trash-alt"></i> Deletar
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </th:block>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Pastas na Lixeira -->
  <div class="row">
    <div class="col-12">
      <h4 class="mb-3">Pastas na Lixeira</h4>
      <table class="table table-bordered">
        <thead>
        <tr>
          <th>Nome da Pasta</th>
          <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="folder : ${trashFolders}">
          <tr>
            <td th:text="${folder}"></td>
            <td>
              <div class="action-buttons">
                <form th:action="@{/storage/restoreFolderFromTrash}" method="post" class="d-inline">
                  <input type="hidden" name="folderPath" th:value="${folder}" />
                  <button type="submit" class="btn btn-restore">
                    <i class="fas fa-undo"></i> Restaurar
                  </button>
                </form>
                <form th:action="@{/storage/deleteFolderFromTrash}" method="post" class="d-inline">
                  <input type="hidden" name="folderPath" th:value="${folder}" />
                  <button type="submit" class="btn btn-delete">
                    <i class="fas fa-trash-alt"></i> Deletar
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </th:block>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  &copy; 2025 MeuDrive - Todos os direitos reservados
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
