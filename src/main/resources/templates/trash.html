<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lixeira</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <link href="/css/styles.css" rel="stylesheet"> <!-- Se você tiver um arquivo CSS adicional -->
  <style>
    /* Personalizando a exibição do botão */
    .btn-inicio {
      background-color: #007bff;
      color: white;
      font-size: 16px;
      padding: 10px 20px;
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .btn-inicio:hover {
      background-color: #0056b3;
      text-decoration: none;
    }
    .btn-inicio i {
      margin-right: 8px;
    }
  </style>
</head>
<body>
<div class="container mt-5">
  <!-- Botão de Início -->
  <div class="d-flex justify-content-between mb-5">
    <h2>Lixeira</h2>
    <a href="/" class="btn btn-inicio">
      <i class="fas fa-home"></i> Início
    </a>
  </div>

  <!-- Arquivos na Lixeira -->
  <div class="row mb-4">
    <div class="col-12">
      <h4 class="mb-3">Arquivos na Lixeira</h4>
      <div class="row">
        <th:block th:each="file : ${trashFiles}">
          <div class="col-md-4 col-sm-6 mb-4">
            <div class="card shadow-lg rounded border-light">
              <div class="card-body text-center">
                <i class="fas fa-file-alt fa-3x text-primary mb-3"></i>
                <h5 class="card-title text-truncate" th:text="${file}"></h5>
                <div class="action-buttons mt-3">
                  <!-- Botões de Ação -->
                  <form th:action="@{/storage/restoreFromTrash}" method="post" class="d-inline">
                    <input type="hidden" name="filePath" th:value="${file}" />
                    <button type="submit" class="btn btn-sm btn-outline-success w-100">
                      <i class="fas fa-undo"></i> Restaurar
                    </button>
                  </form>
                  <form th:action="@{/storage/deleteFromTrash}" method="post" class="d-inline mt-2">
                    <input type="hidden" name="filePath" th:value="${file}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                      <i class="fas fa-trash-alt"></i> Deletar
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </th:block>
      </div>
    </div>
  </div>

  <!-- Pastas na Lixeira -->
  <div class="row">
    <div class="col-12">
      <h4 class="mb-3">Pastas na Lixeira</h4>
      <div class="row">
        <th:block th:each="folder : ${trashFolders}">
          <div class="col-md-4 col-sm-6 mb-4">
            <div class="card shadow-lg rounded border-light">
              <div class="card-body text-center">
                <i class="fas fa-folder-open fa-3x text-warning mb-3"></i>
                <h5 class="card-title text-truncate" th:text="${folder}"></h5>
                <div class="action-buttons mt-3">
                  <!-- Botões de Ação -->
                  <form th:action="@{/storage/restoreFolderFromTrash}" method="post" class="d-inline">
                    <input type="hidden" name="folderPath" th:value="${folder}" />
                    <button type="submit" class="btn btn-sm btn-outline-success w-100">
                      <i class="fas fa-undo"></i> Restaurar
                    </button>
                  </form>
                  <form th:action="@{/storage/deleteFolderFromTrash}" method="post" class="d-inline mt-2">
                    <input type="hidden" name="folderPath" th:value="${folder}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                      <i class="fas fa-trash-alt"></i> Deletar
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </th:block>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
