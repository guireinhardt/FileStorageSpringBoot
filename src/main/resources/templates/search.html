<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Busca de Arquivos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header>
    <div class="logo">
        <img src="/images/agri_.png" alt="Logo" class="logo-img">
    </div>
</header>

<div class="form-container">
    <form th:action="@{/search}" method="get" class="search-form">
        <h2>Busca de Arquivos</h2>

        <input type="text" name="query" placeholder="Digite sua busca..." />

        <select name="keyword" id="keyword">
            <option value="">Selecione uma palavra-chave</option>
            <option th:each="keyword : ${keywords}" th:value="${keyword}" th:text="${keyword}"></option>
        </select>

        <select name="city">
            <option value="">Selecione uma cidade</option>
            <option th:each="city : ${cities}" th:value="${city}" th:text="${city}"></option>
        </select>

        <button type="submit"><i class="fas fa-search"></i> Buscar</button>
    </form>
</div>

<div class="results" th:if="${files != null}">
    <form id="bulkDownloadForm" method="post" th:action="@{/bulk-download}">
        <h2>Resultados da Busca:</h2>
        <div class="buttons-bar">
            <button type="submit" class="bulk-download-btn"><i class="fas fa-download"></i> Baixar Selecionados</button>
        </div>

        <ul class="file-list">
            <li th:each="file : ${files}">
                <input type="checkbox" name="selectedFiles" th:value="${file.fullPath}" class="file-checkbox">

                <span class="file-name" th:text="${file.name}"></span>

                <!-- Visualizar -->
                <a th:href="@{/view/{fileName}(fileName=${file.name})}" target="_blank" title="Visualizar">
                    <i class="fas fa-eye action-icon"></i>
                </a>

                <!-- Download -->
                <a th:href="@{/download/{fileName}(fileName=${file.name})}" title="Download">
                    <i class="fas fa-download action-icon"></i>
                </a>

                <!-- Compartilhar -->
                <button type="button"
                        class="share-btn"
                        th:attr="data-file=${file.fullPath}"
                        onclick="shareFileFromButton(this)"
                        title="Compartilhar">
                    <i class="fas fa-share-alt action-icon"></i>
                </button>

                <!-- Renomear -->
                <button type="button"
                        th:attr="data-file=${file.fullPath}"
                        onclick="renameFile(this.getAttribute('data-file'))"
                        title="Renomear">
                    <i class="fas fa-pen action-icon"></i>
                </button>

                <!-- Deletar -->
                <button type="button"
                        th:attr="data-file=${file.fullPath}"
                        onclick="deleteFile(this.getAttribute('data-file'))"
                        title="Deletar">
                    <i class="fas fa-trash action-icon"></i>
                </button>
            </li>
        </ul>
    </form>

    <div class="back-button">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Início</a>
    </div>
</div>

<script src="/js/search.js"></script>
<div id="toast" class="toast"></div>

</body>
</html>
