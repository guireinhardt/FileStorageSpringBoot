<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Busca de Arquivos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header class="p-3 text-center custom-header">
    <img src="/images/agri_.png" alt="Logo" class="img-fluid" style="max-height: 80px;">
</header>

<div class="container mt-4">
    <form th:action="@{/search}" method="get" class="border p-4 rounded bg-light">
        <h2 class="mb-4">Busca de Arquivos</h2>
        <div class="row g-3">

            <div class="col-md-6 flex-grow-1">
                <input type="text" class="form-control" name="query" placeholder="Digite sua busca..."
                       th:value="${query}" />
            </div>

            <div class="mb-3">
                <label for="keyword" class="form-label">Palavra-chave</label>
                <select id="keyword" name="keyword" class="form-select" onchange="updateSubkeywords()">
                    <option value="">-- Selecione --</option>
                    <th:block th:each="key : ${keywords}">
                        <option th:value="${key}" th:text="${displayMap.get(key)}" th:selected="${key == selectedKeyword}"></option>
                    </th:block>
                </select>
            </div>

            <div class="mb-3" id="subkeywords-container">
                <label class="form-label">Subpalavras-chave</label>
                <div id="subkeywords-list" class="form-check">
                    <th:block th:if="${selectedKeyword != null and selectedKeyword != '' and subkeywordsMap.containsKey(selectedKeyword)}">
                        <th:block th:each="subkey : ${subkeywordsMap.get(selectedKeyword)}">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       th:id="${subkey}" th:name="subkeywords"
                                       th:value="${subkey}"
                                       th:checked="${selectedSubkeywords != null and selectedSubkeywords.contains(subkey)}" />
                                <label class="form-check-label" th:for="${subkey}" th:text="${subkey}"></label>
                            </div>
                        </th:block>
                    </th:block>
                </div>
            </div>



            <div class="col-md-3">
                <select name="institute" class="form-select">
                    <option value="">Selecione um instituto</option>
                    <option th:each="inst : ${institutes}" th:value="${inst}" th:text="${inst}"
                            th:selected="${inst == selectedInstitute}"></option>
                </select>
            </div>

            <div class="col-md-3">
                <select name="city" class="form-select">
                    <option value="">Selecione uma cidade</option>
                    <option th:each="city : ${cities}" th:value="${city}" th:text="${city}" th:selected="${city == selectedCity}"></option>
                </select>

            </div>

            <div class="col-md-2">
                <input type="date" name="startDate" class="form-control" placeholder="Data Inicial"
                       th:value="${startDate}" />
            </div>

            <div class="col-md-2">
                <input type="date" name="endDate" class="form-control" placeholder="Data Final"
                       th:value="${endDate}" />
            </div>

            <div class="col-12 text-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </div>
        </div>
    </form>
</div>

<!-- Mensagem "Nenhum arquivo encontrado" -->
<div class="container mt-5 text-center text-muted"
     th:if="${hasFilters} and (${files == null} or ${files.size()} == 0)">
    <p>Nenhum arquivo encontrado com os filtros informados.</p>
</div>

<!-- Resultados da busca, só aparece se tem filtros e arquivos -->
<div class="container mt-5" th:if="${hasFilters} and ${files != null} and ${files.size()} > 0">
    <form id="bulkDownloadForm" method="post" >
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Resultados da Busca:</h2>
            <button type="submit" class="btn custom-yellow-btn">
                <i class="fas fa-download"></i> Baixar Selecionados
            </button>
        </div>

        <ul class="list-group">
            <li class="list-group-item d-flex align-items-center justify-content-between flex-wrap" th:each="file : ${files}">
                <div class="form-check me-3">
                    <input class="form-check-input file-checkbox" type="checkbox" name="selectedFiles" th:value="${file.relativePath}">
                </div>

                <span class="file-name flex-fill" th:text="${file.name}"></span>

                <div class="btn-group" role="group">
                    <!-- Visualizar -->
                    <a th:href="@{'/view'(path=${file.fullPath})}" target="_blank" class="btn btn-outline-secondary btn-sm" title="Visualizar">
                        <i class="fas fa-eye"></i>
                    </a>

                    <!-- Download -->
                    <a href="#" class="btn btn-outline-secondary btn-sm btn-download" th:attr="data-file=${file.relativePath}" title="Download">
                        <i class="fas fa-download"></i>
                    </a>

                    <!-- Compartilhar -->
                    <button type="button" class="btn btn-outline-secondary btn-sm share-btn"
                            th:attr="data-file=${file.relativePath}" onclick="shareFileFromButton(this)" title="Compartilhar">
                        <i class="fas fa-share-alt"></i>
                    </button>

                    <!-- Renomear -->
                    <button type="button" class="btn btn-outline-secondary btn-sm rename-btn"
                            th:attr="data-file=${file.relativePath}" onclick="renameFile(this.getAttribute('data-file'))" title="Renomear">
                        <i class="fas fa-edit"></i>
                    </button>

                    <!-- Deletar -->
                    <button type="button" class="btn btn-outline-danger btn-sm"
                            th:attr="data-file=${file.name}" onclick="deleteFile(this.getAttribute('data-file'))" title="Deletar">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </li>
        </ul>

        <div class="mt-4">
            <a href="/" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Voltar ao Início
            </a>
        </div>
    </form>
</div>

<script src="/js/search.js"></script>
<div id="toast" class="toast"></div>

<!-- Bootstrap JS (opcional se não usar componentes JS do Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
