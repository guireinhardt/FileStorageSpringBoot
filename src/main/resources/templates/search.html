<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Arquivos</title>
    <link rel="stylesheet" href="/css/search.css"> <!-- Link para o arquivo CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome -->
</head>
<body>
<header>
    <div class="logo">
        <img src="/images/agri_.png" alt="Logo" class="logo-img">
    </div>
</header>

<div class="form-container">
    <form th:action="@{/search}" method="get" class="search-form">
        <h2>Busca de Arquivos</h2>
        <!-- Campo de pesquisa -->
        <input type="text" name="query" placeholder="Digite sua busca..." required />

        <!-- Filtro por palavra-chave -->
        <select name="keyword" id="keyword" onchange="updateSubKeywords()" required>
            <option value="">Selecione uma palavra-chave</option>
            <option th:each="keyword : ${keywords}" th:value="${keyword}" th:text="${keyword}"></option>
        </select>

        <!-- Filtro por subpalavra-chave (inicialmente escondido) -->
        <select name="subkeyword" id="subkeyword" style="display: none;">
            <option value="">Selecione uma subpalavra-chave</option>
        </select>

        <!-- Filtro por cidade -->
        <select name="city">
            <option value="">Selecione uma cidade</option>
            <option th:each="city : ${cities}" th:value="${city}" th:text="${city}"></option>
        </select>

        <!-- Filtro por data no formato YYYYMMDD -->
        <input type="text" name="date" placeholder="Digite a data (YYYYMMDD)" pattern="\d{8}" maxlength="8" />

        <button type="submit"><i class="fas fa-search"></i> Buscar</button>
    </form>
</div>

<div class="results" th:if="${files}">
    <h2>Resultados da Busca:</h2>
    <ul>
        <li th:each="file : ${files}">
            <a th:href="@{/view/{fileName}(fileName=${file})}" target="_blank">
                <i class="fas fa-eye"></i>
                <span th:text="${file}"></span>
            </a>
        </li>
    </ul>
</div>

<script>
    const subKeywordsMap = /*[[${subkeywordsMap}]]*/ {};

    function updateSubKeywords() {
        const keyword = document.getElementById("keyword").value;
        const subkeywordSelect = document.getElementById("subkeyword");

        // Limpar opções anteriores
        subkeywordSelect.innerHTML = '<option value="">Selecione uma subpalavra-chave</option>';

        if (subKeywordsMap[keyword]) {
            subkeywordSelect.style.display = 'inline-block';

            subKeywordsMap[keyword].forEach(subkeyword => {
                const option = document.createElement("option");
                option.value = subkeyword;
                option.textContent = subkeyword;
                subkeywordSelect.appendChild(option);
            });
        } else {
            subkeywordSelect.style.display = 'none';
        }
    }
</script>
</body>
</html>
