<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Busca</title>
</head>
<body>
<h1>Busca de Arquivos</h1>
<form th:action="@{/search}" method="get">
    <input type="text" name="query" placeholder="Digite sua busca" />
    <select name="keyword">
        <option value="">Selecione uma palavra-chave</option>
        <option th:each="keyword : ${keywords}" th:value="${keyword}" th:text="${keyword}"></option>
    </select>
    <button type="submit">Buscar</button>
</form>
<div th:if="${files}">
    <h2>Resultados da Busca:</h2>
    <ul>
        <li th:each="file : ${files}" th:text="${file}"></li>
    </ul>
</div>
</body>
</html>
