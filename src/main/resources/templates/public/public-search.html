<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Busca Avançada Pública</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Sistema de Arquivos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/advanced-public}">🔎 Busca Avançada</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/public/index}">📁 Arquivos Finalizados</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="mb-4">Busca Avançada Pública</h2>

    <form method="post" th:action="@{/advanced-public}">
        <div class="mb-3">
            <label for="query" class="form-label">Pesquisa (texto livre)</label>
            <input type="text" id="query" name="query" class="form-control" th:value="${query}" placeholder="Digite texto para busca..." />
        </div>

        <div class="mb-3">
            <label for="keyword" class="form-label">Palavra-chave</label>
            <select id="keyword" name="keyword" class="form-select" onchange="updateSubkeywords()">
                <option value="">-- Selecione --</option>
                <th:block th:each="key : ${keywords}">
                    <option th:value="${key}" th:text="${displayMap.get(key)}" th:selected="${key == selectedKeyword}"></option>
                </th:block>
            </select>
        </div>

        <div class="mb-3" id="subkeywords-container">
            <label class="form-label">Subpalavras-chave</label>
            <div id="subkeywords-list" class="form-check">
                <th:block th:if="${selectedKeyword != null and selectedKeyword != '' and subkeywordsMap.containsKey(selectedKeyword)}">
                    <th:block th:each="subkey : ${subkeywordsMap.get(selectedKeyword)}">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   th:id="${subkey}" th:name="subkeywords"
                                   th:value="${subkey}"
                                   th:checked="${selectedSubkeywords != null and selectedSubkeywords.contains(subkey)}" />
                            <label class="form-check-label" th:for="${subkey}" th:text="${subkey}"></label>
                        </div>
                    </th:block>
                </th:block>
            </div>
        </div>


        <button type="submit" class="btn btn-primary">Buscar</button>
    </form>

    <hr/>

    <h4>Resultados</h4>
    <div th:if="${files != null}">
        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>Nome do Arquivo</th>
                <th>Caminho Completo</th>
                <th>Data de Criação</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="file : ${files}">
                <td th:text="${file.name}"></td>
                <td th:text="${file.fullPath}"></td>
                <td th:text="${file.creationDate != null ? file.creationDate : '-'}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary me-1"
                       th:href="@{/view-public(path=${file.publicPath})}" target="_blank">👁 Visualizar</a>

                    <a class="btn btn-sm btn-outline-success"
                       th:href="@{/download-public(path=${file.publicPath})}">⬇ Baixar</a>

                </td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

<!-- Scripts -->
<!-- Primeiro define selectedSubkeywords -->

<script th:inline="javascript">
    const selectedSubkeywords = /*[[${selectedSubkeywords}]]*/ [];
</script>

<!-- Depois vem o script que usa essa variável -->
<script>
    function updateSubkeywords() {
        const keyword = document.getElementById("keyword").value;
        const container = document.getElementById("subkeywords-list");
        container.innerHTML = "";

        if (keyword) {
            fetch(`/subkeywords?keyword=${encodeURIComponent(keyword)}`)
                .then(response => response.json())
                .then(subkeywords => {
                    if (subkeywords.length === 0) {
                        container.innerHTML = "<p class='text-muted'>Nenhuma subpalavra encontrada.</p>";
                        return;
                    }
                    subkeywords.forEach(subkey => {
                        const id = "sub_" + subkey.replace(/\s+/g, '_');
                        const checked = selectedSubkeywords.includes(subkey);

                        const div = document.createElement("div");
                        div.className = "form-check";
                        div.innerHTML = `
                            <input class="form-check-input" type="checkbox" id="${id}" name="subkeywords" value="${subkey}" ${checked ? "checked" : ""}>
                            <label class="form-check-label" for="${id}">${subkey}</label>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch(err => {
                    container.innerHTML = "<p class='text-danger'>Erro ao carregar subpalavras.</p>";
                    console.error("Erro ao buscar subkeywords:", err);
                });
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        const keyword = document.getElementById("keyword").value;
        if (keyword) {
            updateSubkeywords();
        }
    });
</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
