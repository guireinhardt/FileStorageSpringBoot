<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Arquivos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/folders.css">
</head>
<body>

<!-- Caminho da pasta anterior com o link para voltar -->
<div class="top-bar">
    <a th:href="@{${parentFolder != '' ? '/storage/openFolder/' + parentFolder : '/'}}"
       class="btn-voltar">
        <i class="fas fa-arrow-left"></i>
        <span th:text="${parentFolder != '' ? 'Voltar para: ' + parentFolder : 'Voltar ao início'}"></span>
    </a>
</div>

<div class="container">

    <h1>Gerenciador de Arquivos</h1>

    <!-- Título da pasta atual -->
    <h3 th:text="'Pasta: ' + ${currentFolder}"></h3>

    <!-- Botão de upload -->
    <label class="btn-upload">
        <i class="fas fa-upload"></i> Upload de Arquivos
        <input type="hidden" id="folderPath" th:value="${currentFolder}">
        <input type="file" multiple hidden onchange="uploadFiles(this.files)">
    </label>


    <!-- Subpastas -->
    <h2>Pastas</h2>
    <div class="folder" style="position: relative;" th:each="folder : ${folders}">
        <a th:href="@{'/storage/openFolder/' + ${currentFolder} + '/' + ${folder.name}}">
            <i class="fas fa-folder"></i>
            <span th:text="${folder.name}"></span>
        </a>
        <button type="button"
                class="move-btn"
                th:attr="data-folder=${currentFolder + '/' + folder.name}"
                onclick="openMoveFolderModal(this)"
                title="Mover Pasta"
                style="position: absolute; top: 5px; right: 5px;">
            <i class="fas fa-folder-open action-icon"></i>
        </button>
    </div>


    <!-- Arquivos -->
    <h2>Arquivos</h2>
    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="file : ${files}">
            <td th:text="${file.name}"></td>


            <td>
                <a href="#" class="btn-view"
                   th:attr="data-file=${currentFolder + '/' + file.name}"
                   title="Visualizar"><i class="fas fa-eye"></i></a>
                <a href="#" class="btn-rename" th:attr="data-file=${file.relativePath}" title="Renomear">
                    <i class="fas fa-edit"></i>
                </a>

                <a href="#" class="btn-share" th:attr="data-file=${file.relativePath}" title="Compartilhar">
                    <i class="fas fa-share-alt"></i>
                </a>

                <a href="#" class="btn-download" th:attr="data-file=${file.relativePath}" title="Download">
                    <i class="fas fa-download"></i>
                </a>

                <button type="button"
                        class="move-btn"
                        th:attr="data-file=${file.relativePath}"
                        onclick="openMoveModal(this)"
                        title="Mover Arquivo">
                    <i class="fas fa-folder-open action-icon"></i>
                </button>


            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Botão flutuante para criar pasta -->
<button id="btnNovaPasta" class="btn-flutuante" title="Criar nova pasta">
    <i class="fas fa-folder-plus"></i>
</button>

<!-- Modal de criação de pasta -->
<div id="modalNovaPasta" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Criar Nova Pasta</h3>
        <!-- Botão de fechar dentro do form -->
        <button class="close-btn" onclick="closeModal('modalNovaPasta')">
            <i class="fas fa-times"></i>
        </button>
        <form method="post" th:action="@{/storage/createFolder}">
            <input type="hidden" name="currentFolder" th:value="${currentFolder}">
            <input type="text" name="folderName" placeholder="Nome da nova pasta" required>
            <button type="submit">Criar</button>
        </form>
    </div>
</div>

<!-- Modal de renomear arquivo -->
<div id="modalRenameFile" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Renomear Arquivo</h3>
        <!-- Botão de fechar dentro do form -->
        <button class="close-btn" onclick="closeModal('modalRenameFile')">
            <i class="fas fa-times"></i>
        </button>
        <form id="renameForm">
            <input type="hidden" id="filePath" name="filePath" />  <!-- Campo oculto para armazenar o caminho completo -->
            <label for="oldFileName">Nome atual:</label>
            <input type="text" id="oldFileName" name="oldFileName" readonly />

            <label for="newFileName">Novo nome:</label>
            <input type="text" id="newFileName" name="newFileName" />

            <button type="submit">Renomear</button>
        </form>

    </div>
</div>
<div id="moveModal" style="display:none; position:fixed; top:20%; left:30%; background:white; padding:20px; border:1px solid #ccc; z-index:1000">
    <h3>Mover Arquivo</h3>
    <select id="folderSelect"></select>
    <br><br>
    <button id="confirmMove">Mover</button>
    <button onclick="document.getElementById('moveModal').style.display='none'">Cancelar</button>
</div>


<!-- Toast -->
<div class="toast" id="toast">
    <span id="toastMessage"></span>
    <!-- Removido o botão X do Toast -->
</div>

<script>
    // Função de upload de arquivos
    function uploadFiles(files) {
        const folderPath = document.getElementById("folderPath").value;
        const formData = new FormData();
        formData.append("folderPath", folderPath);
        for (let file of files) formData.append("files", file);

        fetch("/storage/uploadFiles", {
            method: "POST",
            body: formData
        }).then(response => {
            if (!response.ok) throw new Error("Falha no upload");
            showToast("Upload concluído");
            location.reload();
        }).catch(() => showToast("Erro no upload"));
    }

    // Função para abrir o modal
    document.getElementById('btnNovaPasta').onclick = function() {
        document.getElementById('modalNovaPasta').style.display = "block";
    };

    // Função para fechar o modal
    function closeModal(id) {
        document.getElementById(id).style.display = "none";
    }

    document.querySelectorAll('.btn-rename').forEach(btn => {
    btn.onclick = (e) => {
        e.preventDefault();
        const file = btn.getAttribute("data-file");  // Caminho completo do arquivo
        const nameWithoutPath = file.substring(file.lastIndexOf("/") + 1);  // Extrai o nome do arquivo sem o caminho
        const nameWithoutExt = nameWithoutPath.substring(0, nameWithoutPath.lastIndexOf('.'));  // Nome sem a extensão

        // Preencher os campos do modal
        document.getElementById("oldFileName").value = file;  // Caminho completo do arquivo
        document.getElementById("newFileName").value = nameWithoutExt;  // Nome sem extensão
        document.getElementById("filePath").value = file;  // Mantém o caminho completo no campo oculto

        // Mostrar o modal
        document.getElementById("modalRenameFile").style.display = "block";
    };
});

// Enviar a alteração de renomeação
document.getElementById("renameForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const oldFileNameWithPath = document.getElementById("filePath").value;  // Caminho completo do arquivo
    const newFileNameWithoutExt = document.getElementById("newFileName").value;

    // Extrair a extensão original
    const fileExt = oldFileNameWithPath.substring(oldFileNameWithPath.lastIndexOf('.'));

    // Combinar o novo nome com a extensão original
    const newFileName = newFileNameWithoutExt + fileExt;

    // Enviar a requisição para o servidor com o caminho completo
    fetch(`/storage/renameFile?oldName=${encodeURIComponent(oldFileNameWithPath)}&newName=${encodeURIComponent(newFileName)}`, {
        method: 'PATCH',
        credentials: 'include'
    })
    .then(response => {
        if (response.ok) {
            alert("Arquivo renomeado!");
            location.reload();  // Recarregar a página para refletir a alteração
        } else {
            alert("Erro ao renomear.");
        }
    });
});
    // Função para exibir o toast de sucesso
    function showToast(message, duration = 5000) {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        toastMessage.textContent = message;
        toast.style.display = 'flex';

        const timer = setTimeout(() => {
            toast.style.display = 'none';
        }, duration);
    }
    // visualizar arquivo
    document.querySelectorAll('.btn-view').forEach(link => {
    link.addEventListener('click', e => {
        e.preventDefault();
        const file = e.target.closest('a').getAttribute('data-file');
        window.open(`/storage/viewFile/${file}`, '_blank');

    });
});
    // Compartilhar arquivo a partir do botão
// Compartilhar arquivo a partir do botão
function shareFileFromButton(button) {
    const filePath = button.getAttribute('data-file'); // Correto, uma vez só
    const baseUrl = window.location.origin;

    const lastSlashIndex = filePath.lastIndexOf('/');
    const folderPath = filePath.substring(0, lastSlashIndex);
    const fileName = filePath.substring(lastSlashIndex + 1);
    const shareUrl = `${baseUrl}/storage/viewFile/${folderPath}/${encodeURIComponent(fileName)}`;

    navigator.clipboard.writeText(shareUrl).then(function () {
        showToast(`Link copiado!`);
    }, function (err) {
        showToast("Erro ao copiar link: " + err);
    });
}

    // Adicionar evento de compartilhamento para o botão de compartilhamento
document.querySelectorAll('.btn-share').forEach(btn => {
    btn.onclick = function (e) {
        e.preventDefault();
        shareFileFromButton(btn);
    };
});
    // download
document.querySelectorAll('.btn-download').forEach(link => {
    link.addEventListener('click', e => {
        e.preventDefault();
        const fullPath = e.target.closest('a').getAttribute('data-file'); // Renomeado para evitar conflito

        // Separa o caminho e o nome do arquivo
        const lastSlashIndex = fullPath.lastIndexOf('/');
        const folderPath = fullPath.substring(0, lastSlashIndex);
        const fileName = fullPath.substring(lastSlashIndex + 1);

        // Monta a URL com o caminho intacto e o nome codificado
        const url = `/storage/downloadFile/${folderPath}/${encodeURIComponent(fileName)}`;

        fetch(url, {
            method: 'GET',
            credentials: 'include'
        })
        .then(res => {
            if (!res.ok) throw new Error("Erro no download");
            return res.blob();
        })
        .then(blob => {
            const downloadUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            a.remove();
        })
        .catch(err => alert("Erro ao baixar: " + err.message));
    });
});
let fileToMove = "";

function openMoveModal(button) {
    fileToMove = button.getAttribute('data-file');

    fetch('/storage/folders', {
        headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('authToken')
        }
    })
    .then(response => response.json())
    .then(folders => {
        const folderSelect = document.getElementById('folderSelect');
        folderSelect.innerHTML = "";

        folders.forEach(folder => {
            const option = document.createElement('option');
            option.value = folder;
            option.textContent = folder;
            folderSelect.appendChild(option);
        });

        document.getElementById('moveModal').style.display = 'block';
    })
    .catch(err => {
        console.error("Erro ao buscar pastas:", err);
        alert("Erro ao carregar pastas.");
    });
}

    document.getElementById('confirmMove').onclick = function () {
        const newFolder = document.getElementById('folderSelect').value;

        const params = new URLSearchParams({
            fullPath: itemToMove,
            newParentFolder: newFolder
        });

        const url = isFolder ? '/storage/moveFolder' : '/storage/moveFile';

        fetch(url + '?' + params.toString(), {
            method: 'PATCH',
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('authToken')
            }
        })
        .then(response => {
            if (response.ok) {
                alert(isFolder ? "Pasta movida com sucesso!" : "Arquivo movido com sucesso!");
                location.reload();
            } else {
                return response.text().then(text => { throw new Error(text); });
            }
        })
        .catch(error => {
            console.error("Erro ao mover:", error);
            alert("Erro ao mover: " + error.message);
        });

        document.getElementById('moveModal').style.display = 'none';
    };
};


// mover pasta reutilizando o #moveModal

    //variaveis de controle
let itemToMove = "";
let isFolder = false;

    function openMoveFolderModal(button) {
    isFolder = true;
    itemToMove = button.getAttribute('data-folder');

    fetch('/storage/folders', {
        headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('authToken')
        }
    })
    .then(response => response.json())
    .then(folders => {
        const folderSelect = document.getElementById('folderSelect');
        folderSelect.innerHTML = "";

        const rootOption = document.createElement('option');
        rootOption.value = "";
        rootOption.textContent = "Raiz";
        folderSelect.appendChild(rootOption);

        folders.forEach(folder => {
            if (folder !== itemToMove) {  // Evita mover pasta dentro dela mesma
                const option = document.createElement('option');
                option.value = folder;
                option.textContent = folder;
                folderSelect.appendChild(option);
            }
        });

        document.getElementById('moveModal').style.display = 'block';
    })
    .catch(err => {
        console.error("Erro ao buscar pastas:", err);
        alert("Erro ao carregar pastas.");
    });
}






</script>

<div class="loading-spinner" id="loadingSpinner" style="display:none;"></div>

</body>
</html>
