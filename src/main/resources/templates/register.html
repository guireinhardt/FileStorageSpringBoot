<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Usuário</title>
</head>
<body>
<h1>Registrar Usuário</h1>

<form id="register-form" th:action="@{/auth/register}" method="post">
    <label for="login">Nome de Usuário:</label>
    <input type="text" id="login" name="login" th:value="${usuario?.login}" required>

    <label for="password">Senha:</label>
    <input type="password" id="password" name="password" required>

    <label for="role">Papel:</label>
    <select id="role" name="role">
        <option value="ADMIN" th:selected="${usuario?.role == 'ADMIN'}">Administrador</option>
        <option value="USERS" th:selected="${usuario?.role == 'USERS'}">Usuário</option>
    </select>

    <button type="submit">Registrar</button>
</form>

<script>
    document.getElementById('register-form').addEventListener('submit', function(event) {
        event.preventDefault();

        const data = {
            login: document.getElementById('login').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value
        };

        fetch(this.getAttribute('action'), {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                //alert('Usuário registrado com sucesso!');
                // Exemplo: redirecionar para login
                window.location.href = '/auth/login';
            } else {
                alert('Erro ao registrar usuário');
            }
        })
        .catch(error => {
            console.error('Erro:', error);
            alert('Erro ao enviar dados');
        });
    });
</script>
</body>
</html>
