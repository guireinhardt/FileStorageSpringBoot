<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Usuário</title>
    <link rel="stylesheet" href="/css/login.css"> <!-- reutilizando o CSS da tela de login -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="register-page">
<div class="background">
    <div class="login-container">
        <div class="form-side">
            <img src="/images/agri.jpg" alt="Logo" class="logo">
            <h2>Registrar Usuário</h2>
            <form id="register-form" th:action="@{/auth/register}" method="post">

                <!-- Campo Nome -->
                <div class="input-group">
                    <i class="fas fa-id-card icon-left"></i>
                    <input type="text" id="nome" name="nome" placeholder="Nome Completo"
                           th:value="${usuario?.nome}" required>
                </div>

                <!-- Campo CPF -->
                <div class="input-group">
                    <i class="fas fa-address-card icon-left"></i>
                    <input type="text" id="cpf" name="cpf" placeholder="CPF"
                           th:value="${usuario?.cpf}" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Formato: 000.000.000-00" required>
                </div>

                <!-- Campo Login -->
                <div class="input-group">
                    <i class="fas fa-user icon-left"></i>
                    <input type="text" id="login" name="login" placeholder="Nome de Usuário"
                           th:value="${usuario?.login}" required>
                </div>

                <!-- Campo Senha -->
                <div class="input-group">
                    <i class="fas fa-lock icon-left"></i>
                    <input type="password" id="password" name="password" placeholder="Senha" required>
                    <button type="button" id="togglePassword" class="toggle-password">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>

                <!-- Campo Role -->
                <div class="input-group">
                    <i class="fas fa-users icon-left"></i>
                    <select id="role" name="role" required>
                        <option value="ADMIN" th:selected="${usuario?.role == 'ADMIN'}">Administrador</option>
                        <option value="USERS" th:selected="${usuario?.role == 'USERS'}">Usuário</option>
                    </select>
                </div>

                <button type="submit">Registrar</button>
                <p>Já tem uma conta? <a href="/auth/login">Fazer login</a></p>
            </form>
        </div>
    </div>
</div>

<script>
    // Envio do formulário
    document.getElementById('register-form').addEventListener('submit', function(event) {
    event.preventDefault();

    // Remove máscara do CPF
    const cpfLimpo = document.getElementById('cpf').value.replace(/\D/g, '');

    const data = {
        nome: document.getElementById('nome').value,
        cpf: cpfLimpo,
        login: document.getElementById('login').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
    };

    fetch(this.getAttribute('action'), {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        if (response.ok) {
            window.location.href = '/auth/login';
        } else {
            alert('Erro ao registrar usuário');
        }
    })
    .catch(error => {
        console.error('Erro:', error);
        alert('Erro ao enviar dados');
    });
});


    // Botão de visualização da senha
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';

        eyeIcon.classList.toggle('fa-eye');
        eyeIcon.classList.toggle('fa-eye-slash');
    });
</script>
</body>
</html>
